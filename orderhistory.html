<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bongo Basket | Order History</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{
  --primary:#6366f1;
  --accent:#22c55e;
  --success:#22c55e;
  --warning:#f59e0b;
  --danger:#ef4444;
  --bg:#f1f5f9;
  --card-bg:#ffffff;
  --sidebar-bg:linear-gradient(to bottom,#6366f1,#22c55e);
}
*{ margin:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
body{ display:flex; background:var(--bg); min-height:100vh; }

.sidebar{
  width:250px;
  background:var(--sidebar-bg);
  color:white;
  padding:30px 20px;
}
.sidebar h2{ margin-bottom:30px; text-align:center; }
.sidebar .nav-btn{
  background:rgba(255,255,255,0.2);
  border:none;
  padding:12px;
  border-radius:10px;
  width:100%;
  color:white;
  margin-bottom:12px;
  cursor:pointer;
}

.main-content{ flex:1; display:flex; flex-direction:column; }

.header{
  display:flex;
  justify-content:space-between;
  padding:20px 30px;
  background:linear-gradient(to right,#6366f1,#22c55e);
  color:white;
}

.container{ padding:30px; }

.card{
  display:flex;
  gap:20px;
  background:white;
  margin-bottom:20px;
  padding:20px;
  border-radius:15px;
}
.card img{
  width:120px;
  height:120px;
  object-fit:cover;
  border-radius:10px;
}
.price{ color:#6366f1; font-weight:bold; }

.status{
  background:#22c55e;
  color:white;
  padding:5px 10px;
  border-radius:6px;
  font-size:12px;
}

.modal{
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  padding:25px;
  border-radius:15px;
  width:400px;
}

.download-btn{
  width:100%;
  padding:10px;
  margin-top:15px;
  background:#6366f1;
  color:white;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>BONGO BASKET</h2>
  <button class="nav-btn" onclick="window.location.href='shop.html'">🏠 Dashboard</button>
  <button class="nav-btn" onclick="window.location.href='payment.html'">Go to Payment 💳</button>
</div>

<div class="main-content">
  <div class="header">
    Welcome, <b id="user"></b>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="container">
    <h2>Your Orders</h2>
    <div id="orders"></div>
  </div>
</div>

<div class="modal" id="billModal">
  <div class="modal-content">
    <h3>Order Bill</h3>
    <div id="billDetails"></div>
    <button class="download-btn" onclick="downloadBill()">Download PDF</button>
  </div>
</div>

<script>
const API = "https://my-full-stack-ae3l.onrender.com/api";
const username = localStorage.getItem("username");
let currentBillData = null;

if(!username){ window.location="login.html"; }
document.getElementById("user").innerText = username;

async function loadOrders(){
  const res = await fetch(API + "/orders?username=" + username);
  const data = await res.json();
  const products = data.products;

  document.getElementById("orders").innerHTML = products.map(p => `
    <div class="card">
      <img src="${p.image_url}">
      <div>
        <h3>${p.name}</h3>
        <p>Quantity: ${p.quantity}</p>
        <p class="price">₹${p.total_price}</p>
        <span class="status">Delivered</span>
        <button class="nav-btn" onclick='showBill(${JSON.stringify(p)})'>Show Bill</button>
      </div>
    </div>
  `).join("");
}

function showBill(order){
  currentBillData = order;
  document.getElementById("billDetails").innerHTML = `
    <p>Order ID: ${order.order_id}</p>
    <p>Product: ${order.name}</p>
    <p>Qty: ${order.quantity}</p>
    <p>Total: ₹${order.total_price}</p>
  `;
  document.getElementById("billModal").style.display="flex";
}

/* 🔥 AMAZON STYLE CLEAN INVOICE */
function downloadBill(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const price = Number(currentBillData.price_per_unit || 0);
  const total = Number(currentBillData.total_price || 0);
  const qty = Number(currentBillData.quantity || 0);

  let y = 20;

  doc.setFont("helvetica","bold");
  doc.setFontSize(18);
  doc.text("BONGO BASKET", 20, y);

  doc.setFontSize(10);
  doc.setFont("helvetica","normal");
  doc.text("Tax Invoice / Bill of Supply", 20, y+6);

  doc.line(20, y+10, 190, y+10);

  y += 20;

  doc.setFontSize(11);
  doc.text(`Order ID: ${currentBillData.order_id}`, 20, y);
  doc.text(`Order Date: ${currentBillData.order_date}`, 20, y+6);

  doc.text(`Customer: ${username}`, 120, y);
  doc.text(`Payment: Prepaid`, 120, y+6);

  doc.line(20, y+12, 190, y+12);

  y += 20;

  doc.setFont("helvetica","bold");
  doc.text("Item", 20, y);
  doc.text("Qty", 120, y);
  doc.text("Price", 140, y);
  doc.text("Total", 170, y);

  doc.line(20, y+2, 190, y+2);

  y += 10;

  doc.setFont("helvetica","normal");

  const productLines = doc.splitTextToSize(currentBillData.name, 90);

  doc.text(productLines, 20, y);
  doc.text(String(qty), 120, y);
  doc.text(`₹${price}`, 140, y);
  doc.text(`₹${total}`, 170, y);

  y += productLines.length * 6;

  doc.line(20, y+2, 190, y+2);

  y += 10;

  doc.setFont("helvetica","bold");
  doc.text("Subtotal:", 140, y);
  doc.text(`₹${total}`, 170, y);

  y += 6;
  doc.text("Shipping:", 140, y);
  doc.text("₹0", 170, y);

  y += 6;
  doc.setFontSize(12);
  doc.text("Grand Total:", 140, y);
  doc.text(`₹${total}`, 170, y);

  y += 20;
  doc.setFontSize(10);
  doc.setFont("helvetica","normal");

  doc.text("Thank you for shopping with Bongo Basket!", 20, y);

  doc.save(`Invoice_${currentBillData.order_id}.pdf`);
}

function logout(){
  localStorage.clear();
  window.location.href="login.html";
}

loadOrders();
</script>

</body>
</html>
