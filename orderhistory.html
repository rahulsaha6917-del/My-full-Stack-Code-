<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bongo Basket | Order History</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{
  --primary:#6366f1;
  --accent:#22c55e;
  --success:#22c55e;
  --warning:#f59e0b;
  --danger:#ef4444;
  --bg:#f1f5f9;
  --card-bg:#ffffff;
  --sidebar-bg:linear-gradient(to bottom,#6366f1,#22c55e);
}

*{ margin:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }

body{ display:flex; background:var(--bg); min-height:100vh; }

/* SIDEBAR */
.sidebar{
  width:250px;
  background:var(--sidebar-bg);
  color:white;
  display:flex;
  flex-direction:column;
  padding:30px 20px;
  border-radius:0 15px 15px 0;
}

.sidebar h2{ margin-bottom:30px; text-align:center; }

.sidebar .nav-btn{
  background:rgba(255,255,255,0.2);
  border:none;
  padding:12px;
  border-radius:10px;
  width:100%;
  color:white;
  font-weight:600;
  margin-bottom:12px;
  cursor:pointer;
}

/* MAIN */
.main-content{ flex:1; display:flex; flex-direction:column; }

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 30px;
  background:linear-gradient(to right,#6366f1,#22c55e);
  color:white;
}

/* CONTAINER */
.container{ padding:30px; }

/* CARD */
.card{
  display:flex;
  gap:20px;
  background:white;
  margin-bottom:20px;
  padding:20px;
  border-radius:15px;
}

.card img{
  width:120px;
  height:120px;
  object-fit:cover;
  border-radius:10px;
}

.price{ font-weight:bold; color:var(--primary); }

.status{
  display:inline-block;
  padding:5px 10px;
  border-radius:6px;
  font-size:12px;
  margin-top:8px;
}
.delivered{background:var(--success);color:white;}

.empty{text-align:center; padding:50px;}

/* MODAL */
.modal{
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}
.modal-content{
  background:white;
  padding:25px;
  border-radius:15px;
  width:400px;
}

/* 🎉 CELEBRATION */
.celebration{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
  color:white;
  text-align:center;
}

.celebration h1{
  font-size:28px;
  margin-bottom:20px;
}

/* 📦 FALLING BOX */
.box{
  position:absolute;
  top:-100px;
  width:40px;
  height:40px;
  background:#d97706;
  border-radius:6px;
  animation:fall 4s linear infinite;
}

@keyframes fall{
  0%{transform:translateY(-100px) rotate(0deg);}
  100%{transform:translateY(110vh) rotate(360deg);}
}

</style>
</head>
<body>

<div class="sidebar">
  <h2>BONGO BASKET</h2>
  <button class="nav-btn" onclick="window.location.href='shop.html'">🏠 Dashboard</button>
  <button class="nav-btn" onclick="window.location.href='payment.html'">Go to Payment 💳</button>
</div>

<div class="main-content">

  <div class="header">
    Welcome, <b id="user"></b>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="container">
    <h2>Your Orders</h2>
    <div id="orders"></div>
  </div>

</div>

<!-- MODAL -->
<div class="modal" id="billModal">
  <div class="modal-content">
    <h3>Order Bill</h3>
    <div id="billDetails"></div>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<!-- 🎉 CELEBRATION -->
<div class="celebration" id="celebration">
  <h1>🎉 Thank you for using my product!<br> Please visit again 🙏</h1>
</div>

<script>
const API = "https://my-full-stack-ae3l.onrender.com/api";
const username = localStorage.getItem("username");
let currentBillData = null;

if(!username){ window.location = "login.html"; }
document.getElementById("user").innerText = username;

/* LOAD ORDERS */
async function loadOrders(){
  const res = await fetch(API + "/orders?username=" + username);
  const data = await res.json();
  const products = data.products;

  if(!products || products.length===0){
    document.getElementById("orders").innerHTML = `<div class="empty">No Orders</div>`;
    return;
  }

  document.getElementById("orders").innerHTML = products.map(p => `
    <div class="card">
      <img src="${p.image_url}">
      <div>
        <h3>${p.name}</h3>
        <p>Qty: ${p.quantity}</p>
        <p class="price">₹${p.total_price}</p>
        <span class="status delivered">Delivered</span>
        <button onclick='showBill(${JSON.stringify(p)})'>Show Bill</button>
      </div>
    </div>
  `).join("");

  // 🎉 Trigger celebration AFTER loading orders
  showCelebration();
}

/* 🎉 SHOW EFFECT */
function showCelebration(){
  const box = document.getElementById("celebration");
  box.style.display="flex";

  for(let i=0;i<30;i++){
    let b=document.createElement("div");
    b.className="box";
    b.style.left=Math.random()*100+"%";
    b.style.animationDuration=(3+Math.random()*2)+"s";
    box.appendChild(b);
  }

  setTimeout(()=>{
    box.style.display="none";
    box.innerHTML='<h1>🎉 Thank you for using my product!<br> Please visit again 🙏</h1>';
  },5000);
}

/* BILL */
function showBill(order){
  currentBillData = order;
  document.getElementById("billDetails").innerHTML = `
    <p>Order ID: ${order.order_id}</p>
    <p>Product: ${order.name}</p>
    <p>Qty: ${order.quantity}</p>
    <p>Total: ₹${order.total_price}</p>
  `;
  document.getElementById("billModal").style.display="flex";
}

function closeModal(){ document.getElementById("billModal").style.display="none"; }

function logout(){
  localStorage.clear();
  window.location.href="login.html";
}

loadOrders();
</script>

</body>
</html>
