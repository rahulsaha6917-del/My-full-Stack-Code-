<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bongo Basket | Order History</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{
  --primary:#6366f1;
  --accent:#22c55e;
  --success:#22c55e;
  --warning:#f59e0b;
  --danger:#ef4444;
  --bg:#f1f5f9;
  --card-bg:#ffffff;
  --sidebar-bg:linear-gradient(to bottom,#6366f1,#22c55e);
}
*{ margin:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }

body{
  display:flex;
  background:var(--bg);
  min-height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:250px;
  background:var(--sidebar-bg);
  color:white;
  display:flex;
  flex-direction:column;
  padding:30px 20px;
  border-radius:0 15px 15px 0;
  box-shadow:0 0 20px rgba(0,0,0,0.2);
}

.sidebar h2{
  margin-bottom:30px;
  font-size:24px;
  text-align:center;
}

.sidebar .nav-btn{
  background:rgba(255,255,255,0.2);
  border:none;
  padding:12px;
  border-radius:10px;
  width:100%;
  color:white;
  font-weight:600;
  margin-bottom:12px;
  cursor:pointer;
}

/* MAIN */
.main-content{ flex:1; display:flex; flex-direction:column; }

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 30px;
  background:linear-gradient(to right,#6366f1,#22c55e);
  color:white;
  border-radius:0 0 15px 15px;
}

/* ORDERS */
.container{ padding:30px; }

/* MOVING TEXT */
.moving-bar{ overflow:hidden; margin-bottom:15px; }
.moving-track{ display:flex; animation:moveLR 12s linear infinite; }
.moving-text{ padding-right:60px; white-space:nowrap; color:#16a34a; font-weight:600; }

@keyframes moveLR{
  0%{transform:translateX(-100%);}
  100%{transform:translateX(100%);}
}

/* CARD */
.card{
  display:flex;
  gap:20px;
  background:white;
  margin-bottom:20px;
  padding:20px;
  border-radius:15px;
}

.card img{
  width:120px;
  height:120px;
  object-fit:cover;
  border-radius:10px;
}

.price{ font-weight:bold; color:#6366f1; }

/* MODAL */
.modal{
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  padding:25px;
  border-radius:15px;
  width:400px;
}

.close-btn{
  position:absolute;
  right:15px;
  top:10px;
  cursor:pointer;
}

.download-btn{
  width:100%;
  padding:10px;
  margin-top:15px;
  background:#6366f1;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>BONGO BASKET</h2>
</div>

<div class="main-content">

<div class="header">
  <div>Welcome, <b id="user"></b></div>
</div>

<div class="container">

<div class="moving-bar">
  <div class="moving-track">
    <div class="moving-text">🙏 Thank you for using my product 🙏</div>
    <div class="moving-text">🙏 Thank you for using my product 🙏</div>
  </div>
</div>

<h2>Your Orders</h2>
<div id="orders"></div>

</div>
</div>

<div class="modal" id="billModal">
  <div class="modal-content">
    <button class="close-btn" onclick="closeModal()">×</button>
    <h3>Order Bill</h3>
    <div id="billDetails"></div>
    <button class="download-btn" onclick="downloadBill()">Download PDF</button>
  </div>
</div>

<script>
const API = "https://my-full-stack-ae3l.onrender.com/api";
const username = localStorage.getItem("username");
let currentBillData = null;

document.getElementById("user").innerText = username;

async function loadOrders(){
  const res = await fetch(API + "/orders?username=" + username);
  const data = await res.json();

  document.getElementById("orders").innerHTML = data.products.map(p => `
    <div class="card">
      <img src="${p.image_url}">
      <div>
        <h3>${p.name}</h3>
        <p class="price">₹${Number(p.total_price) + 200}</p> <!-- ✅ +200 -->
        <button onclick='showBill(${JSON.stringify(p)})'>Show Bill</button>
      </div>
    </div>
  `).join("");
}

function showBill(order){
  currentBillData = order;

  document.getElementById("billDetails").innerHTML = `
    <p><b>Total Price:</b> ₹${Number(order.total_price) + 200}</p> <!-- ✅ -->
  `;

  document.getElementById("billModal").style.display="flex";
}

function closeModal(){
  document.getElementById("billModal").style.display="none";
}

function downloadBill(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const total = Number(currentBillData.total_price) + 200; // ✅

  doc.text("BONGO BASKET",20,20);
  doc.text("Total: ₹" + total,20,40);

  doc.save("bill.pdf");
}

loadOrders();
</script>

</body>
</html>
