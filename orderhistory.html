<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bongo Basket | Order History</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
/* ===== YOUR UI (UNCHANGED) ===== */
:root{
  --primary:#6366f1;
  --accent:#22c55e;
  --success:#22c55e;
  --warning:#f59e0b;
  --danger:#ef4444;
  --bg:#f1f5f9;
  --card-bg:#ffffff;
  --sidebar-bg:linear-gradient(to bottom,#6366f1,#22c55e);
}

*{ margin:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }

body{
  display:flex;
  background:var(--bg);
  min-height:100vh;
}

.sidebar{
  width:250px;
  background:var(--sidebar-bg);
  color:white;
  display:flex;
  flex-direction:column;
  padding:30px 20px;
  border-radius:0 15px 15px 0;
}

.sidebar h2{ margin-bottom:30px; text-align:center; }

.sidebar .nav-btn{
  background:rgba(255,255,255,0.2);
  border:none;
  padding:12px;
  border-radius:10px;
  width:100%;
  color:white;
  margin-bottom:12px;
  cursor:pointer;
}

.main-content{ flex:1; display:flex; flex-direction:column; }

.header{
  display:flex;
  justify-content:space-between;
  padding:20px 30px;
  background:linear-gradient(to right,#6366f1,#22c55e);
  color:white;
}

.container{ padding:30px; }

.card{
  display:flex;
  gap:20px;
  background:white;
  margin-bottom:20px;
  padding:20px;
  border-radius:15px;
}

.card img{
  width:120px;
  height:120px;
  object-fit:cover;
  border-radius:10px;
}

.price{ color:#6366f1; font-weight:bold; }

.status{
  background:#22c55e;
  color:white;
  padding:5px 10px;
  border-radius:6px;
  font-size:12px;
}

.modal{
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  padding:25px;
  border-radius:15px;
  width:400px;
}

.download-btn{
  width:100%;
  padding:10px;
  margin-top:15px;
  background:#6366f1;
  color:white;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>BONGO BASKET</h2>
  <button class="nav-btn" onclick="window.location.href='shop.html'">🏠 Dashboard</button>
  <button class="nav-btn" onclick="window.location.href='payment.html'">Go to Payment 💳</button>
</div>

<div class="main-content">

  <div class="header">
    Welcome, <b id="user"></b>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="container">
    <h2>Your Orders</h2>
    <div id="orders"></div>
  </div>
</div>

<!-- BILL MODAL -->
<div class="modal" id="billModal">
  <div class="modal-content">
    <h3>Order Bill</h3>
    <div id="billDetails"></div>
    <button class="download-btn" onclick="downloadBill()">Download PDF</button>
  </div>
</div>

<script>
const API = "https://my-full-stack-ae3l.onrender.com/api";
const username = localStorage.getItem("username");
let currentBillData = null;

if(!username){ window.location="login.html"; }
document.getElementById("user").innerText = username;

async function loadOrders(){
  const res = await fetch(API + "/orders?username=" + username);
  const data = await res.json();
  const products = data.products;

  document.getElementById("orders").innerHTML = products.map(p => `
    <div class="card">
      <img src="${p.image_url}">
      <div>
        <h3>${p.name}</h3>
        <p>Quantity: ${p.quantity}</p>
        <p class="price">₹${p.total_price}</p>
        <span class="status">Delivered</span>
        <button class="nav-btn" onclick='showBill(${JSON.stringify(p)})'>Show Bill</button>
      </div>
    </div>
  `).join("");
}

function showBill(order){
  currentBillData = order;
  document.getElementById("billDetails").innerHTML = `
    <p>Order ID: ${order.order_id}</p>
    <p>Product: ${order.name}</p>
    <p>Qty: ${order.quantity}</p>
    <p>Total: ₹${order.total_price}</p>
  `;
  document.getElementById("billModal").style.display="flex";
}

/* 🔥 COLORFUL REALISTIC INVOICE */
function downloadBill(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const price = Number(currentBillData.price_per_unit);
  const total = Number(currentBillData.total_price);
  const qty = Number(currentBillData.quantity);

  // HEADER
  doc.setFillColor(34,197,94); // green
  doc.rect(0,0,210,30,"F");

  doc.setTextColor(255,255,255);
  doc.setFontSize(18);
  doc.text("BONGO BASKET", 20, 18);

  doc.setFontSize(11);
  doc.text("Premium Invoice", 20, 25);

  doc.setTextColor(0,0,0);

  // DETAILS
  doc.text(`Order ID: ${currentBillData.order_id}`, 20, 45);
  doc.text(`Customer: ${username}`, 20, 52);
  doc.text(`Date: ${currentBillData.order_date}`, 20, 59);

  // TABLE HEADER
  doc.setFillColor(99,102,241);
  doc.rect(20,70,170,10,"F");

  doc.setTextColor(255,255,255);
  doc.text("Product", 22, 77);
  doc.text("Qty", 110, 77);
  doc.text("Price", 130, 77);
  doc.text("Total", 160, 77);

  doc.setTextColor(0,0,0);

  // ROW
  doc.rect(20,80,170,12);
  doc.text(currentBillData.name, 22, 88);
  doc.text(String(qty), 112, 88);
  doc.text(`₹${price}`, 130, 88);
  doc.text(`₹${total}`, 160, 88);

  // TOTAL BOX
  doc.setFillColor(240,240,240);
  doc.rect(120,100,70,25,"F");

  doc.setFontSize(12);
  doc.text("Grand Total", 125, 112);
  doc.setFontSize(16);
  doc.text(`₹${total}`, 145, 120);

  // FOOTER
  doc.setFontSize(11);
  doc.text("Thank you for shopping with us!", 20, 150);

  doc.save(`Invoice_${currentBillData.order_id}.pdf`);
}

function logout(){
  localStorage.clear();
  window.location.href="login.html";
}

loadOrders();
</script>

</body>
</html>
