<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bongo Basket | Order History</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
/* (NO UI CHANGES — SAME AS YOUR CODE) */
:root{
  --primary:#6366f1;
  --accent:#22c55e;
  --success:#22c55e;
  --warning:#f59e0b;
  --danger:#ef4444;
  --bg:#f1f5f9;
  --card-bg:#ffffff;
  --sidebar-bg:linear-gradient(to bottom,#6366f1,#22c55e);
}
*{ margin:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
body{ display:flex; background:var(--bg); min-height:100vh; }
/* ... KEEP ALL YOUR CSS SAME ... */
</style>
</head>
<body>

<!-- SAME HTML (NO CHANGE) -->

<script>
const API = "https://my-full-stack-ae3l.onrender.com/api";
const username = localStorage.getItem("username");
let currentBillData = null;

const DELIVERY_CHARGE = 200; // ✅ ADDED

if(!username){ window.location = "login.html"; }

document.getElementById("user").innerText = username;

async function loadOrders(){
  try{
    const res = await fetch(API + "/orders?username=" + username);
    const data = await res.json();
    const products = data.products;

    if(!products || products.length === 0){
      document.getElementById("orders").innerHTML =
        `<div class="empty">No Orders Found 😔</div>`;
      return;
    }

    document.getElementById("orders").innerHTML = products.map(p => {

      const totalWithDelivery = Number(p.total_price) + DELIVERY_CHARGE; // ✅

      return `
      <div class="card">
        <img src="${p.image_url || 'https://via.placeholder.com/120'}">
        <div class="details">
          <h3>${p.name}</h3>
          <p>${p.description || ''}</p>
          <p>Quantity: ${p.quantity}</p>
          <p class="price">₹${totalWithDelivery}</p> <!-- ✅ UPDATED -->
          <p>Order ID: ${p.order_id}</p>
          <p>Date: ${p.order_date}</p>
          <span class="status delivered">Delivered</span>
          <button class="nav-btn" onclick='showBill(${JSON.stringify(p)})'>Show Bill</button>
        </div>
      </div>
    `;
    }).join("");

  } catch(e){
    document.getElementById("orders").innerHTML =
      `<div class="empty">Error loading orders ❌</div>`;
  }
}

function showBill(order){
  currentBillData = order;

  const totalWithDelivery = Number(order.total_price) + DELIVERY_CHARGE; // ✅

  let html = `
    <p><b>Order ID:</b> ${order.order_id}</p>
    <p><b>Product:</b> ${order.name}</p>
    <p><b>Quantity:</b> ${order.quantity}</p>
    <p><b>Price per unit:</b> ₹${order.price_per_unit}</p>
    <p><b>Subtotal:</b> ₹${order.total_price}</p>
    <p><b>Delivery Charge:</b> ₹${DELIVERY_CHARGE}</p> <!-- ✅ -->
    <p><b>Total Price:</b> ₹${totalWithDelivery}</p> <!-- ✅ -->
    <p><b>Order Date:</b> ${order.order_date}</p>
    <p><b>Customer:</b> ${username}</p>
  `;

  document.getElementById("billDetails").innerHTML = html;
  document.getElementById("billModal").style.display = "flex";
}

function closeModal(){
  document.getElementById("billModal").style.display = "none";
}

function downloadBill(){
  if(!currentBillData) return;

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const price = Number(currentBillData.price_per_unit || 0);
  const subtotal = Number(currentBillData.total_price || 0);
  const qty = Number(currentBillData.quantity || 0);

  const grandTotal = subtotal + DELIVERY_CHARGE; // ✅

  let y = 20;

  // HEADER
  doc.setFillColor(79,70,229);
  doc.rect(0,0,210,40,"F");

  doc.setTextColor(255,255,255);
  doc.setFont("helvetica","bold");
  doc.setFontSize(20);
  doc.text("BONGO BASKET", 20, 20);

  doc.setFontSize(11);
  doc.text("Tax Invoice", 20, 30);

  doc.setTextColor(0,0,0);

  y = 55;

  doc.setFont("helvetica","bold");
  doc.text("Billing Details", 20, y);

  doc.setFont("helvetica","normal");
  doc.text(`Customer: ${username}`, 20, y+8);
  doc.text(`Order ID: ${currentBillData.order_id}`, 20, y+15);
  doc.text(`Date: ${currentBillData.order_date}`, 20, y+22);

  y += 45;

  doc.setFillColor(240,240,240);
  doc.rect(20, y, 170, 12, "F");

  doc.setFont("helvetica","bold");
  doc.text("Item", 22, y+8);
  doc.text("Qty", 115, y+8);
  doc.text("Price", 140, y+8);
  doc.text("Total", 165, y+8);

  y += 18;

  doc.setFont("helvetica","normal");

  const lines = doc.splitTextToSize(currentBillData.name, 85);

  doc.text(lines, 22, y);
  doc.text(String(qty), 115, y);
  doc.text(`INR ${price}`, 140, y);
  doc.text(`INR ${subtotal}`, 165, y);

  y += lines.length * 6;

  doc.line(20, y, 190, y);

  y += 12;

  doc.setFont("helvetica","bold");

  doc.text("Subtotal:", 130, y);
  doc.text(`INR ${subtotal}`, 190, y, { align: "right" });

  y += 8;
  doc.text("Delivery:", 130, y);
  doc.text(`INR ${DELIVERY_CHARGE}`, 190, y, { align: "right" }); // ✅

  y += 10;
  doc.line(130, y-4, 190, y-4);

  doc.setFontSize(13);
  doc.text("Grand Total:", 130, y);
  doc.text(`INR ${grandTotal}`, 190, y, { align: "right" }); // ✅

  y += 25;

  doc.setFontSize(10);
  doc.setFont("helvetica","normal");
  doc.text("Thank you for shopping with Bongo Basket!", 20, y);

  doc.save(`Invoice_${currentBillData.order_id}.pdf`);
}

function logout(){
  localStorage.clear();
  window.location.href = "login.html";
}

loadOrders();
</script>

</body>
</html>
