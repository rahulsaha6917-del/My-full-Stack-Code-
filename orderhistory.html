<!-- ONLY CHANGE IS INSIDE downloadBill() FUNCTION -->

<script>
function downloadBill(){
  if(!currentBillData) return;

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  // ===== HEADER =====
  doc.setFont("helvetica","bold");
  doc.setFontSize(20);
  doc.text("BONGO BASKET", 20, 20);

  doc.setFontSize(12);
  doc.setFont("helvetica","normal");
  doc.text("E-Commerce Invoice", 20, 28);

  // Line
  doc.line(20, 32, 190, 32);

  // ===== ORDER INFO =====
  doc.setFontSize(11);
  doc.text(`Order ID: ${currentBillData.order_id}`, 20, 40);
  doc.text(`Order Date: ${currentBillData.order_date}`, 20, 46);

  doc.text(`Customer: ${username}`, 140, 40);
  doc.text(`Status: Delivered`, 140, 46);

  // Divider
  doc.line(20, 52, 190, 52);

  // ===== PRODUCT TABLE HEADER =====
  doc.setFont("helvetica","bold");
  doc.text("Product", 20, 60);
  doc.text("Qty", 110, 60);
  doc.text("Price", 130, 60);
  doc.text("Total", 160, 60);

  doc.line(20, 63, 190, 63);

  // ===== PRODUCT DATA =====
  doc.setFont("helvetica","normal");
  doc.text(currentBillData.name, 20, 70);
  doc.text(String(currentBillData.quantity), 110, 70);
  doc.text(`₹${currentBillData.price_per_unit}`, 130, 70);
  doc.text(`₹${currentBillData.total_price}`, 160, 70);

  // Divider
  doc.line(20, 80, 190, 80);

  // ===== TOTAL SECTION =====
  doc.setFont("helvetica","bold");
  doc.text("Subtotal:", 130, 90);
  doc.text(`₹${currentBillData.total_price}`, 160, 90);

  doc.setFont("helvetica","normal");
  doc.text("Delivery:", 130, 97);
  doc.text("₹0", 160, 97);

  doc.setFont("helvetica","bold");
  doc.text("Grand Total:", 130, 105);
  doc.text(`₹${currentBillData.total_price}`, 160, 105);

  // Divider
  doc.line(20, 115, 190, 115);

  // ===== FOOTER =====
  doc.setFontSize(10);
  doc.setFont("helvetica","normal");
  doc.text("Thank you for shopping with Bongo Basket!", 20, 125);
  doc.text("For support: support@bongobasket.com", 20, 132);

  // Save
  doc.save(`Invoice_${currentBillData.order_id}.pdf`);
}
</script>
