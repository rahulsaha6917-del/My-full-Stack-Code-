<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bongo Basket | Order History</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{
  --primary:#6366f1;
  --accent:#22c55e;
  --success:#22c55e;
  --warning:#f59e0b;
  --danger:#ef4444;
  --bg:#f1f5f9;
  --card-bg:#ffffff;
  --sidebar-bg:linear-gradient(to bottom,#6366f1,#22c55e);
}

/* RESET */
*{ margin:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }

body{
  display:flex;
  background:var(--bg);
  min-height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:250px;
  background:var(--sidebar-bg);
  color:white;
  display:flex;
  flex-direction:column;
  padding:30px 20px;
  border-radius:0 15px 15px 0;
  box-shadow:0 0 20px rgba(0,0,0,0.2);
}

.sidebar h2{
  margin-bottom:30px;
  font-size:24px;
  text-align:center;
}

.sidebar .nav-btn{
  background:rgba(255,255,255,0.2);
  border:none;
  padding:12px;
  border-radius:10px;
  width:100%;
  color:white;
  font-weight:600;
  margin-bottom:12px;
  cursor:pointer;
  transition:0.3s;
}

.sidebar .nav-btn:hover{
  background:rgba(255,255,255,0.4);
}

/* MAIN CONTENT */
.main-content{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 30px;
  background:linear-gradient(to right,#6366f1,#22c55e);
  color:white;
  border-radius:0 0 15px 15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.header .user-info{
  font-weight:600;
}

.header .header-buttons button{
  margin-left:10px;
  padding:8px 14px;
  border:none;
  border-radius:8px;
  font-weight:600;
  cursor:pointer;
  color:white;
  transition:0.3s;
}

.header .shop-btn{ background:#3b82f6; }
.header .shop-btn:hover{ background:#2563eb; }

.header .payment-btn{ background:#22c55e; }
.header .payment-btn:hover{ background:#16a34a; }

.header .logout-btn{ background:#ef4444; }
.header .logout-btn:hover{ background:#dc2626; }

/* ORDERS */
.container{
  padding:30px;
}

/* 🔥 MOVING HEADING (ONLY ADDITION) */
.moving-bar{
  width:100%;
  overflow:hidden;
  margin-bottom:15px;
}
.moving-track{
  display:flex;
  width:max-content;
  animation:moveLR 12s linear infinite;
}
.moving-text{
  font-size:18px;
  font-weight:600;
  color:#16a34a;
  padding-right:60px;
  white-space:nowrap;
}
@keyframes moveLR{
  0%{transform:translateX(-100%);}
  100%{transform:translateX(100%);}
}

/* CARD */
.card{
  display:flex;
  gap:20px;
  background:var(--card-bg);
  margin-bottom:20px;
  padding:20px;
  border-radius:15px;
  box-shadow:0 6px 15px rgba(0,0,0,0.08);
  flex-wrap:wrap;
  transition:0.3s;
}

.card:hover{ transform:translateY(-5px); }

.card img{
  width:120px;
  height:120px;
  object-fit:cover;
  border-radius:10px;
}

.details{
  flex:1;
}

.price{
  font-weight:bold;
  color:var(--primary);
  font-size:18px;
  margin:5px 0;
}

.status{
  display:inline-block;
  padding:5px 10px;
  border-radius:6px;
  font-size:12px;
  margin-top:8px;
}

.delivered{background:var(--success);color:white;}
.pending{background:var(--warning);color:white;}
.cancelled{background:var(--danger);color:white;}

.empty{
  text-align:center;
  padding:50px;
  color:#555;
  font-size:18px;
}

/* Bill Modal (UNCHANGED) */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.modal-content{
  background:white;
  color:#000;
  padding:25px;
  border-radius:15px;
  width:400px;
  max-height:80%;
  overflow-y:auto;
  position:relative;
}

.modal-content h3{
  text-align:center;
  margin-bottom:15px;
}

.close-btn{
  position:absolute;
  top:10px;
  right:15px;
  font-size:18px;
  cursor:pointer;
  background:none;
  border:none;
  color:#ef4444;
}

.download-btn{
  display:block;
  width:100%;
  padding:10px;
  margin-top:15px;
  background:var(--primary);
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  transition:0.3s;
}

.download-btn:hover{ background:#4f46e5; }

/* Responsive */
@media(max-width:900px){
  body{ flex-direction:column; }
  .sidebar{
    width:100%;
    border-radius:0 0 15px 15px;
    flex-direction:row;
    justify-content:space-around;
  }
  .main-content{ padding:20px; }
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>BONGO BASKET</h2>
  <button class="nav-btn" onclick="window.location.href='shop.html'">🏠 Dashboard</button>
  <button class="nav-btn" onclick="window.location.href='payment.html'">Go to Payment 💳</button>
</div>

<!-- MAIN -->
<div class="main-content">

  <!-- HEADER (UNCHANGED) -->
  <div class="header">
    <div class="user-info">
      Welcome, <b id="user"></b>
    </div>
    <div class="header-buttons">
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <!-- ORDERS -->
  <div class="container">

    <!-- 🔥 ONLY ADDED FEATURE -->
    <div class="moving-bar">
      <div class="moving-track">
        <div class="moving-text">🙏 Thank you for using my product, please visit again 🙏</div>
        <div class="moving-text">🙏 Thank you for using my product, please visit again 🙏</div>
        <div class="moving-text">🙏 Thank you for using my product, please visit again 🙏</div>
      </div>
    </div>

    <h2>Your Orders</h2>
    <div id="orders"></div>
  </div>
</div>

<!-- Bill Modal (UNCHANGED) -->
<div class="modal" id="billModal">
  <div class="modal-content" id="billContent">
    <button class="close-btn" onclick="closeModal()">×</button>
    <h3>Order Bill</h3>
    <div id="billDetails"></div>
    <button class="download-btn" onclick="downloadBill()">Download PDF</button>
  </div>
</div>

<script>
const API = "https://my-full-stack-ae3l.onrender.com/api";
const username = localStorage.getItem("username");
let currentBillData = null;

if(!username){ window.location = "login.html"; }

document.getElementById("user").innerText = username;

// GROUP BY ORDER ID
function groupOrders(products){
  const grouped = {};

  products.forEach(p => {
    if(!grouped[p.order_id]){
      grouped[p.order_id] = [];
    }
    grouped[p.order_id].push(p);
  });

  return Object.values(grouped);
}

async function loadOrders(){
  try{
    const res = await fetch(API + "/orders?username=" + username);
    const data = await res.json();
    const products = data.products;

    if(!products || products.length === 0){
      document.getElementById("orders").innerHTML =
        `<div class="empty">No Orders Found 😔</div>`;
      return;
    }

    const groupedOrders = groupOrders(products);

    document.getElementById("orders").innerHTML = groupedOrders.map(orderGroup => {

      const first = orderGroup[0];
      const delivery = 200;

      let subtotal = orderGroup.reduce((sum, item) => {
        return sum + (Number(item.price_per_unit) * Number(item.quantity));
      }, 0);

      const grandTotal = subtotal + delivery;

      return `
      <div class="card">
        <img src="${first.image_url || 'https://via.placeholder.com/120'}">
        <div class="details">
          <h3>Order ID: ${first.order_id}</h3>
          <p>Total Items: ${orderGroup.length}</p>
          <p>Date: ${first.order_date}</p>

          <p class="price">₹${grandTotal}</p>

          <span class="status delivered">Delivered</span>

          <button class="nav-btn" onclick='showBill(${JSON.stringify(orderGroup)})'>
            Show Bill
          </button>
        </div>
      </div>
      `;
    }).join("");

  } catch(e){
    document.getElementById("orders").innerHTML =
      `<div class="empty">Error loading orders ❌</div>`;
  }
}

// SHOW BILL (MODAL)
function showBill(orderGroup){
  currentBillData = orderGroup;

  const delivery = 200;
  let subtotal = 0;

  let itemsHTML = orderGroup.map(item => {
    const price = Number(item.price_per_unit);
    const qty = Number(item.quantity);
    const total = price * qty;

    subtotal += total;

    return `
      <p><b>${item.name}</b> (x${qty}) - ₹${total}</p>
      <p>Price/unit: ₹${price}</p>
      <hr>
    `;
  }).join("");

  const grandTotal = subtotal + delivery;

  let html = `
    <p><b>Order ID:</b> ${orderGroup[0].order_id}</p>
    <p><b>Date:</b> ${orderGroup[0].order_date}</p>
    <p><b>Customer:</b> ${username}</p>

    <hr>
    ${itemsHTML}

    <p><b>Subtotal:</b> ₹${subtotal}</p>
    <p><b>Delivery Charge:</b> ₹${delivery}</p>
    <p><b>Total Amount:</b> ₹${grandTotal}</p>
  `;

  document.getElementById("billDetails").innerHTML = html;
  document.getElementById("billModal").style.display = "flex";
}

function closeModal(){
  document.getElementById("billModal").style.display = "none";
}

// DOWNLOAD PDF
function downloadBill(){
  if(!currentBillData) return;

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const delivery = 200;

  let y = 20;

  // HEADER
  doc.setFillColor(79,70,229);
  doc.rect(0,0,210,40,"F");

  doc.setTextColor(255,255,255);
  doc.setFont("helvetica","bold");
  doc.setFontSize(20);
  doc.text("BONGO BASKET", 20, 20);

  doc.setFontSize(11);
  doc.text("Tax Invoice", 20, 30);

  doc.setTextColor(0,0,0);

  // DETAILS
  y = 55;

  doc.setFont("helvetica","bold");
  doc.text("Billing Details", 20, y);

  doc.setFont("helvetica","normal");

  doc.text(`Customer: ${username}`, 20, y+8);
  doc.text(`Order ID: ${currentBillData[0].order_id}`, 20, y+15);
  doc.text(`Date: ${currentBillData[0].order_date}`, 20, y+22);

  // TABLE HEADER
  y += 40;

  doc.setFillColor(240,240,240);
  doc.rect(20, y, 170, 12, "F");

  doc.setFont("helvetica","bold");
  doc.text("Item", 22, y+8);
  doc.text("Qty", 110, y+8);
  doc.text("Price", 135, y+8);
  doc.text("Total", 165, y+8);

  y += 18;

  let subtotal = 0;

  doc.setFont("helvetica","normal");

  currentBillData.forEach(item => {
    const price = Number(item.price_per_unit);
    const qty = Number(item.quantity);
    const total = price * qty;

    subtotal += total;

    const lines = doc.splitTextToSize(item.name, 80);

    doc.text(lines, 22, y);
    doc.text(String(qty), 110, y);
    doc.text(`INR ${price}`, 135, y);
    doc.text(`INR ${total}`, 165, y);

    y += lines.length * 6 + 6;
  });

  // TOTAL SECTION
  y += 10;

  const grandTotal = subtotal + delivery;

  doc.setFont("helvetica","bold");

  doc.text("Subtotal:", 130, y);
  doc.text(`INR ${subtotal}`, 190, y, { align: "right" });

  y += 8;

  doc.text("Delivery Charge:", 130, y);
  doc.text(`INR ${delivery}`, 190, y, { align: "right" });

  y += 10;

  doc.setLineWidth(0.5);
  doc.line(130, y-4, 190, y-4);

  doc.setFontSize(13);

  doc.text("Grand Total:", 130, y);
  doc.text(`INR ${grandTotal}`, 190, y, { align: "right" });

  // FOOTER
  y += 25;

  doc.setFontSize(10);
  doc.setFont("helvetica","normal");

  doc.text("Thank you for shopping with Bongo Basket!", 20, y);
  doc.text("This is a system-generated invoice.", 20, y+6);

  doc.save(`Invoice_${currentBillData[0].order_id}.pdf`);
}

function logout(){
  localStorage.clear();
  window.location.href = "login.html";
}

loadOrders();
</script>
