<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bongo Basket | Order History</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{
  --primary:#6366f1;
  --accent:#22c55e;
  --success:#22c55e;
  --warning:#f59e0b;
  --danger:#ef4444;
  --bg:#f1f5f9;
  --card-bg:#ffffff;
  --sidebar-bg:linear-gradient(to bottom,#6366f1,#22c55e);
}

/* RESET */
*{ margin:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }

body{
  display:flex;
  background:var(--bg);
  min-height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:250px;
  background:var(--sidebar-bg);
  color:white;
  display:flex;
  flex-direction:column;
  padding:30px 20px;
  border-radius:0 15px 15px 0;
  box-shadow:0 0 20px rgba(0,0,0,0.2);
}

.sidebar h2{
  margin-bottom:30px;
  font-size:24px;
  text-align:center;
}

.sidebar .nav-btn{
  background:rgba(255,255,255,0.2);
  border:none;
  padding:12px;
  border-radius:10px;
  width:100%;
  color:white;
  font-weight:600;
  margin-bottom:12px;
  cursor:pointer;
  transition:0.3s;
}

.sidebar .nav-btn:hover{
  background:rgba(255,255,255,0.4);
}

/* MAIN CONTENT */
.main-content{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* HEADER (FIXED) */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 30px;
  background:linear-gradient(to right,#6366f1,#22c55e);
  color:white;
  border-radius:0 0 15px 15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);

  flex-wrap:wrap;
  gap:10px;
}

.header .user-info{
  font-weight:600;
  font-size:16px;
}

.header .header-buttons{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:flex-end;
}

.header .logout-btn{
  background:#ef4444;
  padding:10px 16px;
  border:none;
  border-radius:8px;
  font-weight:600;
  cursor:pointer;
  color:white;
  white-space:nowrap;
  transition:0.3s;
}

.header .logout-btn:hover{ background:#dc2626; }

/* ORDERS */
.container{
  padding:30px;
}

/* MOVING TEXT */
.moving-bar{
  width:100%;
  overflow:hidden;
  margin-bottom:15px;
}
.moving-track{
  display:flex;
  width:max-content;
  animation:moveLR 12s linear infinite;
}
.moving-text{
  font-size:18px;
  font-weight:600;
  color:#16a34a;
  padding-right:60px;
  white-space:nowrap;
}
@keyframes moveLR{
  0%{transform:translateX(-100%);}
  100%{transform:translateX(100%);}
}

/* CARD */
.card{
  display:flex;
  gap:20px;
  background:var(--card-bg);
  margin-bottom:20px;
  padding:20px;
  border-radius:15px;
  box-shadow:0 6px 15px rgba(0,0,0,0.08);
  flex-wrap:wrap;
}

.card img{
  width:120px;
  height:120px;
  object-fit:cover;
  border-radius:10px;
}

.details{ flex:1; }

.price{
  font-weight:bold;
  color:var(--primary);
  font-size:18px;
  margin:5px 0;
}

.status{
  display:inline-block;
  padding:5px 10px;
  border-radius:6px;
  font-size:12px;
  margin-top:8px;
}

.delivered{background:var(--success);color:white;}

.empty{
  text-align:center;
  padding:50px;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  padding:25px;
  border-radius:15px;
  width:400px;
}

.close-btn{
  position:absolute;
  right:20px;
  top:10px;
  background:none;
  border:none;
  font-size:18px;
  color:red;
  cursor:pointer;
}

/* MOBILE FIX */
@media(max-width:600px){
  body{ flex-direction:column; }

  .sidebar{
    width:100%;
    flex-direction:row;
    justify-content:space-around;
    border-radius:0 0 15px 15px;
  }

  .header{
    flex-direction:column;
    align-items:flex-start;
  }

  .header .header-buttons{
    width:100%;
    justify-content:flex-start;
  }
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>BONGO BASKET</h2>
  <button class="nav-btn" onclick="window.location.href='shop.html'">🏠 Dashboard</button>
  <button class="nav-btn" onclick="window.location.href='payment.html'">Go to Payment 💳</button>
</div>

<div class="main-content">

<div class="header">
  <div class="user-info">
    Welcome, <b id="user"></b>
  </div>
  <div class="header-buttons">
    <button class="logout-btn" onclick="logout()">🚪 Logout</button>
  </div>
</div>

<div class="container">

<div class="moving-bar">
  <div class="moving-track">
    <div class="moving-text">🙏 Thank you for using my product, please visit again 🙏</div>
  </div>
</div>

<h2>Your Orders</h2>
<div id="orders"></div>

</div>
</div>

<!-- MODAL -->
<div class="modal" id="billModal">
  <div class="modal-content">
    <button class="close-btn" onclick="closeModal()">×</button>
    <h3>Order Bill</h3>
    <div id="billDetails"></div>
    <button onclick="downloadBill()">Download PDF</button>
  </div>
</div>

<script>
// SAME WORKING SCRIPT (NO CHANGE)
function logout(){
  localStorage.clear();
  window.location.href = "login.html";
}
</script>

</body>
</html>
