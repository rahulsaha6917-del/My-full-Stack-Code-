<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bongo Basket | Order History</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{
  --primary:#6366f1;
  --accent:#22c55e;
  --success:#22c55e;
  --warning:#f59e0b;
  --danger:#ef4444;
  --bg:#f1f5f9;
  --card-bg:#ffffff;
  --sidebar-bg:linear-gradient(to bottom,#6366f1,#22c55e);
}

*{ margin:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }

body{
  display:flex;
  background:var(--bg);
  min-height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:250px;
  background:var(--sidebar-bg);
  color:white;
  display:flex;
  flex-direction:column;
  padding:30px 20px;
  border-radius:0 15px 15px 0;
  box-shadow:0 0 20px rgba(0,0,0,0.2);
}

.sidebar h2{
  margin-bottom:30px;
  font-size:24px;
  text-align:center;
}

.sidebar .nav-btn{
  background:rgba(255,255,255,0.2);
  border:none;
  padding:12px;
  border-radius:10px;
  width:100%;
  color:white;
  font-weight:600;
  margin-bottom:12px;
  cursor:pointer;
  transition:0.3s;
}

.sidebar .nav-btn:hover{
  background:rgba(255,255,255,0.4);
}

/* MAIN */
.main-content{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 30px;
  background:linear-gradient(to right,#6366f1,#22c55e);
  color:white;
  border-radius:0 0 15px 15px;
}

/* CONTAINER */
.container{
  padding:30px;
}

/* 🔥 MOVING HEADING */
.moving-bar{
  width:100%;
  overflow:hidden;
  margin-bottom:15px;
}

.moving-track{
  display:flex;
  width:max-content;
  animation:moveLR 10s linear infinite;
}

.moving-text{
  font-size:20px;
  font-weight:600;
  color:#16a34a;
  padding-right:50px;
  white-space:nowrap;
}

/* LEFT → RIGHT */
@keyframes moveLR{
  0%{transform:translateX(-100%);}
  100%{transform:translateX(100%);}
}

/* CARD */
.card{
  display:flex;
  gap:20px;
  background:white;
  margin-bottom:20px;
  padding:20px;
  border-radius:15px;
}

.card img{
  width:120px;
  height:120px;
  object-fit:cover;
  border-radius:10px;
}

.price{ font-weight:bold; color:var(--primary); }

.status{
  display:inline-block;
  padding:5px 10px;
  border-radius:6px;
  font-size:12px;
  margin-top:8px;
}
.delivered{background:var(--success);color:white;}

.empty{text-align:center; padding:50px;}

/* MODAL */
.modal{
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  padding:25px;
  border-radius:15px;
  width:400px;
}
</style>
</head>
<body>

<div class="sidebar">
  <h2>BONGO BASKET</h2>
  <button class="nav-btn" onclick="window.location.href='shop.html'">🏠 Dashboard</button>
  <button class="nav-btn" onclick="window.location.href='payment.html'">Go to Payment 💳</button>
</div>

<div class="main-content">

  <div class="header">
    Welcome, <b id="user"></b>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="container">

    <!-- 🔥 MOVING MESSAGE -->
    <div class="moving-bar">
      <div class="moving-track">
        <div class="moving-text">🙏 Thank you for using my product, please visit again 🙏</div>
        <div class="moving-text">🙏 Thank you for using my product, please visit again 🙏</div>
      </div>
    </div>

    <h2>Your Orders</h2>
    <div id="orders"></div>
  </div>

</div>

<!-- MODAL -->
<div class="modal" id="billModal">
  <div class="modal-content">
    <h3>Order Bill</h3>
    <div id="billDetails"></div>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script>
const API = "https://my-full-stack-ae3l.onrender.com/api";
const username = localStorage.getItem("username");
let currentBillData = null;

if(!username){ window.location = "login.html"; }
document.getElementById("user").innerText = username;

async function loadOrders(){
  const res = await fetch(API + "/orders?username=" + username);
  const data = await res.json();
  const products = data.products;

  if(!products || products.length===0){
    document.getElementById("orders").innerHTML =
      `<div class="empty">No Orders Found 😔</div>`;
    return;
  }

  document.getElementById("orders").innerHTML = products.map(p => `
    <div class="card">
      <img src="${p.image_url}">
      <div>
        <h3>${p.name}</h3>
        <p>Qty: ${p.quantity}</p>
        <p class="price">₹${p.total_price}</p>
        <span class="status delivered">Delivered</span>
        <button onclick='showBill(${JSON.stringify(p)})'>Show Bill</button>
      </div>
    </div>
  `).join("");
}

function showBill(order){
  currentBillData = order;
  document.getElementById("billDetails").innerHTML = `
    <p>Order ID: ${order.order_id}</p>
    <p>Product: ${order.name}</p>
    <p>Qty: ${order.quantity}</p>
    <p>Total: ₹${order.total_price}</p>
  `;
  document.getElementById("billModal").style.display="flex";
}

function closeModal(){ document.getElementById("billModal").style.display="none"; }

function logout(){
  localStorage.clear();
  window.location.href="login.html";
}

loadOrders();
</script>

</body>
</html>
