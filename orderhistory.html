<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bongo Basket | Order History</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{
  --primary:#6366f1;
  --accent:#22c55e;
  --bg:#f1f5f9;
}

/* RESET */
*{margin:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  display:flex;
  background:var(--bg);
  min-height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  background:linear-gradient(to bottom,#6366f1,#22c55e);
  color:white;
  padding:25px;
}

.sidebar h2{margin-bottom:20px;}

.sidebar button{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border:none;
  border-radius:8px;
  background:rgba(255,255,255,0.2);
  color:white;
  cursor:pointer;
}

/* MAIN */
.main{
  flex:1;
}

/* HEADER */
.header{
  background:white;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

/* CONTENT */
.container{
  padding:25px;
}

/* CARD */
.card{
  display:flex;
  gap:15px;
  background:white;
  padding:15px;
  margin-bottom:15px;
  border-radius:12px;
}

.card img{
  width:100px;
  height:100px;
  border-radius:10px;
}

.details{flex:1;}

.price{
  color:var(--primary);
  font-weight:600;
}

.status{
  background:#22c55e;
  color:white;
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
}

.empty{
  text-align:center;
  padding:50px;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  padding:20px;
  border-radius:12px;
  width:90%;
  max-width:400px;
}

/* 📱 MOBILE */
@media(max-width:800px){

  body{
    flex-direction:column;
  }

  .sidebar{
    width:100%;
    display:flex;
    justify-content:space-around;
  }

  .sidebar h2{display:none;}

  .main{
    width:100%;
  }

  .header{
    flex-direction:column;
    gap:10px;
  }

  .container{
    padding:15px;
  }

  /* STACK CARD */
  .card{
    flex-direction:column;
  }

  .card img{
    width:100%;
    height:160px;
  }

  /* BOTTOM NAV */
  .bottom-nav{
    position:fixed;
    bottom:0;
    width:100%;
    background:white;
    display:flex;
    justify-content:space-around;
    padding:10px;
    box-shadow:0 -4px 10px rgba(0,0,0,0.1);
  }

  .bottom-nav button{
    border:none;
    background:none;
    font-size:14px;
  }

  body{
    padding-bottom:70px;
  }
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>BONGO</h2>
  <button onclick="window.location.href='shop.html'">🏠</button>
  <button onclick="window.location.href='payment.html'">💳</button>
</div>

<div class="main">

  <div class="header">
    <div>Welcome, <b id="user"></b></div>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="container">
    <h2>Your Orders</h2>
    <div id="orders"></div>
  </div>

</div>

<!-- bottom nav -->
<div class="bottom-nav">
  <button onclick="window.location.href='shop.html'">🏠 Home</button>
  <button onclick="window.location.href='cart.html'">🛒 Cart</button>
  <button onclick="window.location.href='payment.html'">💳 Pay</button>
</div>

<!-- modal -->
<div class="modal" id="billModal">
  <div class="modal-content">
    <button onclick="closeModal()">Close</button>
    <div id="billDetails"></div>
    <button onclick="downloadBill()">Download PDF</button>
  </div>
</div>

<script>
const API="https://my-full-stack-ae3l.onrender.com/api";
const username=localStorage.getItem("username");
let currentBillData=null;

if(!username){window.location="login.html";}
document.getElementById("user").innerText=username;

async function loadOrders(){
  const res=await fetch(API+"/orders?username="+username);
  const data=await res.json();
  const products=data.products;

  if(!products.length){
    document.getElementById("orders").innerHTML="<p class='empty'>No Orders</p>";
    return;
  }

  document.getElementById("orders").innerHTML=products.map(p=>`
    <div class="card">
      <img src="${p.image_url}">
      <div class="details">
        <h3>${p.name}</h3>
        <p>Qty: ${p.quantity}</p>
        <p class="price">₹${p.total_price}</p>
        <span class="status">Delivered</span>
        <br><br>
        <button onclick='showBill(${JSON.stringify(p)})'>View Bill</button>
      </div>
    </div>
  `).join("");
}

function showBill(order){
  currentBillData=order;
  document.getElementById("billDetails").innerHTML=`
    Order: ${order.order_id}<br>
    Product: ${order.name}<br>
    Total: ₹${order.total_price}
  `;
  document.getElementById("billModal").style.display="flex";
}

function closeModal(){
  document.getElementById("billModal").style.display="none";
}

function downloadBill(){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF();
  doc.text("Bongo Basket Bill",20,20);
  doc.text("Order ID: "+currentBillData.order_id,20,40);
  doc.text("Total: ₹"+currentBillData.total_price,20,50);
  doc.save("bill.pdf");
}

function logout(){
  localStorage.clear();
  window.location="login.html";
}

loadOrders();
</script>

</body>
</html>
