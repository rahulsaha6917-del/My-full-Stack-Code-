<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account - Bongo Basket</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
/* Reset & Base */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}
body {
  min-height: 100vh;
  background: linear-gradient(135deg,#ea66c2,#764ba2);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
}

/* Header */
header {
  width: 100%;
  padding: 30px 0;
  text-align: center;
  font-size: 40px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 1px;
  background: rgba(0,0,0,0.15);
  box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  backdrop-filter: blur(5px);
  border-bottom-left-radius: 20px;
  border-bottom-right-radius: 20px;
}

/* Card */
.card {
  margin: 40px auto;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(15px);
  width: 100%;
  max-width: 450px;
  padding: 40px;
  border-radius: 20px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.25);
  transition: transform 0.3s, box-shadow 0.3s;
}
.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 25px 50px rgba(0,0,0,0.35);
}

/* Card Heading */
h2 {
  text-align: center;
  margin-bottom: 30px;
  font-size: 28px;
  color: #fff;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
}

/* Form */
.form-group {
  margin-bottom: 20px;
}
label {
  font-size: 14px;
  font-weight: 600;
  color: #fff;
  margin-bottom: 5px;
  display: block;
}
input, select {
  width: 100%;
  padding: 12px;
  margin-top: 6px;
  border-radius: 12px;
  border: none;
  outline: none;
  font-size: 14px;
  transition: 0.3s;
  background: rgba(255,255,255,0.25);
  color: #fff;
  backdrop-filter: blur(5px);
}
input::placeholder {
  color: #eee;
}
input:focus, select:focus {
  box-shadow: 0 0 10px #fff;
}

/* Password toggle */
.password-wrapper {
  position: relative;
}
.toggle {
  position: absolute;
  right: 12px;
  top: 38px;
  cursor: pointer;
  font-size: 12px;
  color: #fff;
  font-weight: 600;
  user-select: none;
}

/* Button */
button {
  width: 100%;
  padding: 14px;
  border: none;
  background: linear-gradient(90deg,#ff8775,#8fff7e);
  color: white;
  font-weight: bold;
  border-radius: 12px;
  cursor: pointer;
  font-size: 16px;
  transition: 0.3s;
}
button:hover {
  background: linear-gradient(90deg,#ff7eb3,#ff758c);
  transform: translateY(-2px);
}
button:disabled {
  background: #999;
  cursor: not-allowed;
}

/* Message */
.message {
  text-align: center;
  margin-top: 15px;
  font-weight: 600;
}

/* Back link */
.back-link {
  text-align: center;
  margin-top: 20px;
  font-size: 14px;
}
.back-link a {
  text-decoration: none;
  color: #fff;
  font-weight: 600;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
}
.back-link a:hover {
  text-decoration: underline;
}

/* Responsive */
@media(max-width:480px){
  .card {
    margin: 20px;
    padding: 30px;
  }
}
</style>
</head>
<body>

<!-- Header -->
<header>Bongo Basket</header>

<!-- Registration Card -->
<div class="card">
  <h2>Create Account</h2>
  <form id="registerForm">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="username" placeholder="Enter your full name" required>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="Enter your email" required>
    </div>

    <div class="form-group password-wrapper">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password" required>
      <span class="toggle" onclick="togglePassword('password')">Show</span>
    </div>

    <div class="form-group password-wrapper">
      <label>Confirm Password</label>
      <input type="password" id="confirmPassword" placeholder="Confirm password" required>
      <span class="toggle" onclick="togglePassword('confirmPassword')">Show</span>
    </div>

    <div class="form-group">
      <label>Role</label>
      <select id="role">
        <option value="CUSTOMER">Customer</option>
        <option value="ADMIN">Admin</option>
      </select>
    </div>

    <button type="submit" id="registerBtn">Register</button>
    <div class="message" id="msg"></div>

    <div class="back-link">
      Already have an account? <a href="login.html">Login Here</a>
    </div>
  </form>
</div>

<script>
function togglePassword(id){
  const input = document.getElementById(id);
  input.type = input.type === "password" ? "text" : "password";
}

document.getElementById("registerForm").addEventListener("submit", async function(e){
  e.preventDefault();

  const username = document.getElementById("username").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const confirmPassword = document.getElementById("confirmPassword").value;
  const role = document.getElementById("role").value;

  const msg = document.getElementById("msg");
  const btn = document.getElementById("registerBtn");
  msg.innerText = "";

  if(password !== confirmPassword){
    msg.style.color = "red";
    msg.innerText = "Passwords do not match!";
    return;
  }

  btn.disabled = true;
  btn.innerText = "Registering...";

  try {
    const response = await fetch(" https://my-full-stack-ae3l.onrender.com/api/users/register", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ username, email, password, role })
    });

    const result = await response.text();

    if(response.ok){
      msg.style.color="lightgreen";
      msg.innerText=result;
      setTimeout(()=>{ window.location.href="login.html"; },2000);
    } else {
      msg.style.color="red";
      msg.innerText=result;
    }

  } catch(error){
    msg.style.color="red";
    msg.innerText="Backend connection failed!";
    console.error(error);
  }

  btn.disabled=false;
  btn.innerText="Register";
});
</script>

</body>
</html>
