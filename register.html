<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account - Bongo Basket</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  background-size:cover;
  background-position:center;
}

/* HEADER */
header{
  width:100%;
  padding:20px 0;
  text-align:center;
  color:#fff;
  background:rgba(0,0,0,0.4);
}

/* LOGO */
.logo{
  width:70px;
  margin-bottom:5px;
}

/* CARD */
.card{
  margin:30px;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(15px);
  width:100%;
  max-width:420px;
  padding:30px;
  border-radius:20px;
  box-shadow:0 15px 35px rgba(0,0,0,0.3);
}

h2{
  text-align:center;
  margin-bottom:25px;
  color:#fff;
}

/* FORM */
.form-group{margin-bottom:18px;}

label{
  font-size:14px;
  color:#fff;
  font-weight:600;
}

input,select{
  width:100%;
  padding:12px;
  margin-top:6px;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,0.2);
  color:#fff;
  outline:none;
}

input::placeholder{color:#eee;}

/* PASSWORD */
.password-wrapper{position:relative;}

.toggle{
  position:absolute;
  right:12px;
  top:38px;
  cursor:pointer;
  font-size:12px;
  color:#fff;
}

/* BUTTON */
button{
  width:100%;
  padding:14px;
  border:none;
  background:linear-gradient(90deg,#ff8775,#8fff7e);
  color:white;
  font-weight:bold;
  border-radius:10px;
  cursor:pointer;
}

button:disabled{background:#999;}

/* MESSAGE */
.message{
  text-align:center;
  margin-top:10px;
  font-weight:600;
}

/* LINK */
.back-link{
  text-align:center;
  margin-top:15px;
}
.back-link a{
  color:#fff;
  text-decoration:none;
}

/* MOBILE */
@media(max-width:480px){
  .card{margin:15px;padding:20px;}
}
</style>
</head>

<body>

<header id="header">
  <h1>Bongo Basket</h1>
</header>

<div class="card">
  <h2>Create Account</h2>

  <form id="registerForm">

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="username" required>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" required>
    </div>

    <div class="form-group password-wrapper">
      <label>Password</label>
      <input type="password" id="password" required>
      <span class="toggle" onclick="togglePassword('password')">Show</span>
    </div>

    <div class="form-group password-wrapper">
      <label>Confirm Password</label>
      <input type="password" id="confirmPassword" required>
      <span class="toggle" onclick="togglePassword('confirmPassword')">Show</span>
    </div>

    <div class="form-group">
      <label>Role</label>
      <select id="role">
        <option value="CUSTOMER">Customer</option>
        <option value="ADMIN">Admin</option>
      </select>
    </div>

    <div class="form-group" id="promo-group" style="display:none;">
      <label>Admin Promo Code</label>
      <input type="text" id="promoCode" placeholder="Enter admin code">
    </div>

    <button type="submit" id="registerBtn">Register</button>

    <div class="message" id="msg"></div>

    <div class="back-link">
      Already have an account? <a href="login.html">Login</a>
    </div>

  </form>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

/* 🎨 BACKGROUND IMAGE (LOCAL FILE) */
document.body.style.backgroundImage = "background.jpeg";

/* 🏢 LOGO (LOCAL FILE) */
const logo = document.createElement("img");
logo.src = "logo.jpeg";
logo.className = "logo";

document.getElementById("header").prepend(logo);

/* API */
const API_URL="https://my-full-stack-ae3l.onrender.com/api/users/register";
const ADMIN_CODE="9831495378";

/* ROLE CHANGE */
document.getElementById("role").addEventListener("change",function(){
  document.getElementById("promo-group").style.display =
    this.value==="ADMIN" ? "block" : "none";
});

/* PASSWORD TOGGLE */
window.togglePassword = function(id){
  const input=document.getElementById(id);
  input.type=input.type==="password"?"text":"password";
};

/* FORM SUBMIT */
document.getElementById("registerForm").addEventListener("submit",async function(e){
  e.preventDefault();

  const username=document.getElementById("username").value.trim();
  const email=document.getElementById("email").value.trim();
  const password=document.getElementById("password").value;
  const confirmPassword=document.getElementById("confirmPassword").value;
  const role=document.getElementById("role").value;
  const promoCode=document.getElementById("promoCode").value.trim();

  const msg=document.getElementById("msg");
  const btn=document.getElementById("registerBtn");

  msg.innerText="";

  if(password!==confirmPassword){
    msg.style.color="red";
    msg.innerText="Passwords do not match!";
    return;
  }

  if(role==="ADMIN" && promoCode!==ADMIN_CODE){
    msg.style.color="red";
    msg.innerText="Invalid Admin Promo Code!";
    return;
  }

  btn.disabled=true;
  btn.innerText="Registering...";

  try{
    const res=await fetch(API_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({username,email,password,role})
    });

    const result=await res.text();

    if(res.ok){
      msg.style.color="lightgreen";
      msg.innerText=result;
      setTimeout(()=>window.location.href="login.html",2000);
    }else{
      msg.style.color="red";
      msg.innerText=result;
    }

  }catch(err){
    msg.style.color="red";
    msg.innerText="Server error!";
  }

  btn.disabled=false;
  btn.innerText="Register";
});

});
</script>

</body>
</html>
