<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bongo Basket Login</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
/* Reset & Base */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

/* Body & Background */
body{
  min-height:100vh;
  background: linear-gradient(135deg,#667eea,#764ba2);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
}

/* Header */
header{
  width:100%;
  padding:30px 0;
  text-align:center;
  font-size:40px;
  font-weight:700;
  color:white;
  letter-spacing:1px;
  background: rgba(0,0,0,0.15);
  box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  backdrop-filter: blur(5px);
  border-bottom-left-radius: 20px;
  border-bottom-right-radius: 20px;
  margin-bottom:40px;
}

/* Login Card */
.card{
  margin:20px auto;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(15px);
  padding:40px;
  border-radius:20px;
  width:100%;
  max-width:400px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.25);
  transition: transform 0.3s, box-shadow 0.3s;
}
.card:hover{
  transform: translateY(-5px);
  box-shadow: 0 25px 50px rgba(0,0,0,0.35);
}

h2{
  text-align:center;
  margin-bottom:25px;
  color:#fff;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
  font-size:28px;
}

/* Inputs */
input{
  width:100%;
  padding:14px;
  margin-top:10px;
  margin-bottom:15px;
  border-radius:12px;
  border:none;
  font-size:14px;
  transition:0.3s;
  background: rgba(255,255,255,0.25);
  color: #fff;
  backdrop-filter: blur(5px);
}
input::placeholder{
  color: #eee;
}
input:focus{
  box-shadow: 0 0 10px #fff;
  outline:none;
}

/* Buttons */
button{
  width:100%;
  padding:14px;
  border:none;
  background: linear-gradient(90deg,#ff758c,#ff7eb3);
  color:white;
  font-weight:bold;
  border-radius:12px;
  cursor:pointer;
  font-size:16px;
  transition:0.3s;
}
button:hover{
  background: linear-gradient(90deg,#ff7eb3,#ff758c);
  transform: translateY(-2px);
}
button:disabled{
  background:#999;
  cursor:not-allowed;
}

/* Messages */
.message{
  text-align:center;
  margin-top:15px;
  font-weight:600;
}

/* Links */
.link{
  text-align:center;
  margin-top:15px;
}
.link a{
  color:#fff;
  font-weight:600;
  text-decoration:none;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
}
.link a:hover{
  text-decoration:underline;
}

/* Responsive */
@media(max-width:480px){
  .card{
    margin:20px;
    padding:30px;
  }
}
</style>
</head>
<body>

<!-- Header -->
<header>Bongo Basket</header>

<!-- Login Card -->
<div class="card">
  <h2>Login</h2>
  <form id="loginForm">
    <input type="text" id="username" placeholder="Username" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit" id="loginBtn">Login</button>
    <div class="message" id="msg"></div>
    <div class="link">
      Don't have an account? <a href="index.html">Register</a>
    </div>
  </form>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", async function(e){
  e.preventDefault();

  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;

  const msg = document.getElementById("msg");
  const btn = document.getElementById("loginBtn");

  btn.disabled = true;
  btn.innerText = "Logging in...";
  msg.innerText = "";

  try{
    const response = await fetch(" https://my-full-stack-ae3l.onrender.com/api/auth/login", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({username, password})
    });

    const result = await response.json();

    if(response.ok){
      msg.style.color="lightgreen";
      msg.innerText="Login Successful!";
      localStorage.setItem("userRole", result.role);
      localStorage.setItem("username", result.username);

      setTimeout(()=>{
        if(result.role==="ADMIN") window.location.href="admin.html";
        else window.location.href="shop.html";
      }, 1200);
    } else{
      msg.style.color="red";
      msg.innerText = result.error || "Invalid credentials";
    }

  } catch(error){
    msg.style.color="red";
    msg.innerText = "Cannot connect to backend";
    console.error(error);
  }

  btn.disabled=false;
  btn.innerText="Login";
});
</script>

</body>
</html>
