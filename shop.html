<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bongo Basket | Modern Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#6366f1;
  --accent:#22c55e;
  --dark:#0f172a;
  --bg:#f8fafc;
}

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:var(--bg);
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  height:100vh;
  background:linear-gradient(180deg,#020617,#0f172a);
  color:white;
  position:fixed;
  left:0;
  top:0;
  padding:20px;
  transition:0.3s;
  z-index:1000;
}

.sidebar h2{
  color:#818cf8;
  margin-bottom:20px;
}

.sidebar a{
  display:block;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  text-decoration:none;
  color:white;
  transition:0.3s;
}

.sidebar a:hover{
  background:rgba(255,255,255,0.1);
}

/* MOBILE HIDE */
.sidebar.hide{
  left:-260px;
}

/* OVERLAY */
.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  display:none;
  z-index:999;
}

.overlay.show{
  display:block;
}

/* MAIN */
.main{
  margin-left:240px;
  width:100%;
  transition:0.3s;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 5%;
  background:white;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

/* HAMBURGER */
.menu-btn{
  font-size:22px;
  cursor:pointer;
  display:none;
}

/* SEARCH */
.search-box{
  padding:10px 15px;
  border-radius:25px;
  border:1px solid #ddd;
}

/* GRID */
.container{
  padding:30px 5%;
}

.product-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
  gap:25px;
}

.card{
  background:white;
  padding:15px;
  border-radius:15px;
  box-shadow:0 8px 20px rgba(0,0,0,0.05);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.img-box{
  height:150px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.price{
  color:var(--primary);
  font-weight:600;
}

.add-btn{
  background:var(--primary);
  color:white;
  padding:10px;
  border:none;
  border-radius:8px;
  width:100%;
  cursor:pointer;
}

/* MOBILE */
@media(max-width:800px){

  .menu-btn{
    display:block;
  }

  .sidebar{
    left:-260px;
  }

  .main{
    margin-left:0;
  }

  .sidebar.show{
    left:0;
  }
}
</style>
</head>

<body>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h2>BONGO</h2>
  <a href="#">🏠 Dashboard</a>
  <a href="#">🛒 Cart</a>
  <a href="#">📦 Orders</a>
  <a href="#">💳 Payment</a>
  <a href="#" onclick="logout()">🚪 Logout</a>
</div>

<!-- MAIN -->
<div class="main">

  <!-- NAV -->
  <nav>
    <span class="menu-btn" onclick="toggleSidebar()">☰</span>

    <input type="text" class="search-box" placeholder="Search...">

    <div>🛒</div>
  </nav>

  <!-- CONTENT -->
  <div class="container">
    <div class="product-grid" id="grid"></div>
  </div>

</div>

<script>
const sidebar=document.getElementById("sidebar");
const overlay=document.getElementById("overlay");

/* TOGGLE SIDEBAR */
function toggleSidebar(){
  sidebar.classList.toggle("show");
  overlay.classList.toggle("show");
}

/* CLOSE ON DESKTOP RESIZE */
window.addEventListener("resize",()=>{
  if(window.innerWidth>800){
    sidebar.classList.remove("show");
    overlay.classList.remove("show");
  }
});

/* DEMO PRODUCTS */
const products=[
  {name:"Apple",price:50},
  {name:"Mango",price:80},
  {name:"Banana",price:30},
  {name:"Orange",price:60},
];

const grid=document.getElementById("grid");

grid.innerHTML=products.map(p=>`
<div class="card">
  <div class="img-box">🍎</div>
  <h4>${p.name}</h4>
  <div class="price">₹${p.price}</div>
  <button class="add-btn">Add</button>
</div>
`).join("");

function logout(){
  alert("Logged out");
}
</script>

</body>
</html>
