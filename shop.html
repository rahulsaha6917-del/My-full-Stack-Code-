<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bongo Basket | Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#6366f1;
  --accent:#22c55e;
  --dark:#0f172a;
  --sidebar:#020617;
  --bg:#eef2f7;
}

*{box-sizing:border-box;margin:0;font-family:'Poppins',sans-serif;}

body{
  display:flex;
  background:var(--bg);
  flex-direction:column;
}

/* 🔥 OFFER BAR */
.offer-bar{
  width:100%;
  background:#ef4444;
  color:white;
  overflow:hidden;
  white-space:nowrap;
  position:fixed;
  top:0;
  z-index:999;
}
.offer-text{
  display:inline-block;
  padding:10px 0;
  font-weight:600;
  animation:moveOffer 10s linear infinite;
}
@keyframes moveOffer{
  0%{transform:translateX(-100%);}
  100%{transform:translateX(100%);}
}

/* 💥 FALLING SHOP CARD */
.shop-banner{
  position:fixed;
  top:-200px;
  left:50%;
  transform:translateX(-50%);
  background:linear-gradient(135deg,#6366f1,#22c55e);
  color:white;
  padding:25px 40px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 15px 30px rgba(0,0,0,0.2);
  z-index:998;
  animation:dropDown 1.2s ease forwards;
}
.shop-banner button{
  background:white;
  color:#6366f1;
  border:none;
  padding:10px 20px;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
}
@keyframes dropDown{
  0%{top:-200px;}
  70%{top:80px;}
  85%{top:60px;}
  100%{top:70px;}
}

/* SIDEBAR */
.sidebar{
  width:240px;
  height:100vh;
  background:var(--sidebar);
  color:white;
  position:fixed;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:20px;
  top:40px;
}

/* MAIN */
.main{
  margin-left:240px;
  width:100%;
  margin-top:120px;
}

/* NAV */
nav{
  background:white;
  padding:15px 5%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.search-box{
  padding:8px 12px;
  border-radius:20px;
  border:1px solid #ddd;
  width:250px;
}

.cart-icon{
  position:relative;
  cursor:pointer;
  font-size:20px;
}

.badge{
  position:absolute;
  top:-6px;
  right:-10px;
  background:var(--accent);
  padding:2px 6px;
  border-radius:50%;
  font-size:11px;
}

.username-display{
  margin-left:20px;
  font-weight:600;
}

/* CONTENT */
.container{
  padding:30px 5%;
}

.category-bar{
  display:flex;
  gap:10px;
  margin-bottom:20px;
  flex-wrap:wrap;
}

.category-btn{
  padding:8px 16px;
  border:none;
  background:var(--dark);
  color:white;
  border-radius:20px;
  cursor:pointer;
}

.product-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
  gap:25px;
}

.card{
  background:white;
  border-radius:15px;
  padding:15px;
  box-shadow:0 6px 15px rgba(0,0,0,0.08);
}

.price{
  margin:10px 0;
}

.old-price{
  text-decoration:line-through;
  color:#999;
  font-size:14px;
}

.new-price{
  color:#22c55e;
  font-size:18px;
  font-weight:700;
}

.add-btn{
  background:var(--primary);
  color:white;
  border:none;
  padding:10px;
  border-radius:8px;
  width:100%;
  cursor:pointer;
}

@media(max-width:800px){
  .sidebar{display:none;}
  .main{margin-left:0;}
}
</style>
</head>

<body>

<!-- 🔥 MOVING OFFER -->
<div class="offer-bar">
  <div class="offer-text">
    🔥 FLAT 50% OFF 🔥 FLAT 50% OFF 🔥 FLAT 50% OFF 🔥
  </div>
</div>

<!-- 💥 FALLING SHOP -->
<div class="shop-banner">
  <h2>🔥 Big Sale is Live!</h2>
  <p>Flat 50% OFF on all items</p>
  <button onclick="scrollToProducts()">Shop Now</button>
</div>

<div class="sidebar">
  <h2>BONGO</h2>
  <a href="shop.html">🏠 Dashboard</a>
  <a href="cart.html">❤️ Cart</a>
  <a href="orderhistory.html">📦 Orders</a>
  <a href="payment.html">💳 Payment</a>
  <a href="#" onclick="logout()">🚪 Logout</a>
</div>

<div class="main">

<nav>
  <div>
    <input type="text" class="search-box" placeholder="Search..." onkeyup="searchProducts(this.value)">
    <span class="username-display" id="username-display"></span>
  </div>
  <div class="cart-icon" onclick="window.location.href='cart.html'">
    🛒 <span class="badge" id="cart-count">0</span>
  </div>
</nav>

<div class="container" id="products-section">
  <div class="category-bar" id="category-bar"></div>
  <div class="product-grid" id="grid"></div>
</div>

</div>

<script>
const API_BASE="https://my-full-stack-ae3l.onrender.com/api";
const currentUsername=localStorage.getItem("username");
let allProducts=[];

window.onload=function(){
  if(!currentUsername){
    window.location.href="login.html";
    return;
  }
  document.getElementById("username-display").innerText = "Hello, " + currentUsername;
  loadProducts();
  loadCategories();
  fetchCartCount();
};

function scrollToProducts(){
  document.getElementById("products-section").scrollIntoView({behavior:"smooth"});
}

async function loadProducts(){
  const res=await fetch(API_BASE+"/products");
  const data=await res.json();
  allProducts=data.products||data;
  renderProducts(allProducts);
}

function searchProducts(q){
  renderProducts(allProducts.filter(p=>p.name.toLowerCase().includes(q.toLowerCase())));
}

async function loadCategories(){
  const res=await fetch(API_BASE+"/categories");
  const data=await res.json();
  const bar=document.getElementById("category-bar");
  bar.innerHTML='<button class="category-btn" onclick="renderProducts(allProducts)">All</button>';

  data.forEach(cat=>{
    const btn=document.createElement("button");
    btn.className="category-btn";
    btn.innerText=cat.category_name;
    btn.onclick=()=>renderProducts(allProducts.filter(p=>p.category===cat.category_name));
    bar.appendChild(btn);
  });
}

function renderProducts(products){
  const grid=document.getElementById("grid");
  if(!products.length){grid.innerHTML="No products";return;}

  grid.innerHTML=products.map(p=>{
    const original = p.price;
    const discounted = (p.price * 0.5).toFixed(0);

    return `
    <div class="card">
      <div class="img-box">
        <img src="${p.images?.[0]||'https://via.placeholder.com/150'}">
      </div>

      <h4>${p.name}</h4>

      <div class="price">
        <div class="old-price">₹${original}</div>
        <div class="new-price">₹${discounted} (50% OFF)</div>
      </div>

      <button class="add-btn" onclick="addToCart(${p.product_id})">
        Add
      </button>
    </div>
    `;
  }).join("");
}

async function addToCart(productId){
  await fetch(API_BASE+"/cart/add",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username:currentUsername,productId,quantity:1})
  });
  fetchCartCount();
}

async function fetchCartCount(){
  const res=await fetch(API_BASE+"/cart/items/count?username="+currentUsername);
  const count=await res.json();
  document.getElementById("cart-count").innerText=count;
}

function logout(){
  localStorage.clear();
  window.location.href="login.html";
}
</script>

</body>
</html>
