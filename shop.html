<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bongo Basket | Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#6366f1;
  --accent:#22c55e;
  --dark:#0f172a;
  --bg:#f8fafc;
}

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:var(--bg);
}

/* SIDEBAR */
.sidebar{
  width:250px;
  height:100vh;
  background:linear-gradient(180deg,#020617,#0f172a);
  color:white;
  position:fixed;
  left:0;
  top:0;
  padding:20px;
  transition:0.3s;
  z-index:1000;
}

.sidebar h2{
  color:#818cf8;
  margin-bottom:20px;
}

.sidebar a{
  display:block;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  text-decoration:none;
  color:white;
  transition:0.3s;
}

.sidebar a:hover{
  background:rgba(255,255,255,0.1);
}

/* MOBILE HIDE */
.sidebar.hide{
  left:-260px;
}

/* OVERLAY */
.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  display:none;
  z-index:999;
}

.overlay.show{
  display:block;
}

/* MAIN */
.main{
  margin-left:250px;
  transition:0.3s;
}

/* NAVBAR */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 5%;
  background:rgba(255,255,255,0.8);
  backdrop-filter:blur(10px);
  border-bottom:1px solid #e5e7eb;
}

/* MENU BTN */
.menu-btn{
  font-size:22px;
  cursor:pointer;
  display:none;
}

/* SEARCH */
.search-box{
  padding:10px 15px;
  border-radius:25px;
  border:1px solid #ddd;
  width:250px;
}

.username{
  margin-left:10px;
  font-weight:600;
}

/* CART */
.cart{
  position:relative;
  cursor:pointer;
}

.badge{
  position:absolute;
  top:-8px;
  right:-10px;
  background:var(--accent);
  color:white;
  padding:3px 6px;
  border-radius:50%;
  font-size:11px;
}

/* CONTENT */
.container{
  padding:30px 5%;
}

/* CATEGORY */
.category-bar{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

.category-btn{
  padding:8px 18px;
  border:none;
  border-radius:30px;
  background:#e2e8f0;
  cursor:pointer;
}

.category-btn:hover{
  background:var(--primary);
  color:white;
}

/* GRID */
.product-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
  gap:25px;
}

/* CARD */
.card{
  background:white;
  padding:15px;
  border-radius:15px;
  box-shadow:0 8px 20px rgba(0,0,0,0.05);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.img-box{
  height:150px;
  display:flex;
  justify-content:center;
  align-items:center;
}

.img-box img{
  max-width:100%;
  max-height:100%;
}

.price{
  color:var(--primary);
  font-weight:600;
  margin:10px 0;
}

.add-btn{
  background:linear-gradient(135deg,#6366f1,#4f46e5);
  color:white;
  padding:10px;
  border:none;
  border-radius:8px;
  width:100%;
  cursor:pointer;
}

/* TOAST */
#toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:var(--accent);
  color:white;
  padding:10px 20px;
  border-radius:10px;
  display:none;
}

/* MOBILE */
@media(max-width:800px){

  .menu-btn{
    display:block;
  }

  .sidebar{
    left:-260px;
  }

  .sidebar.show{
    left:0;
  }

  .main{
    margin-left:0;
  }
}
</style>
</head>

<body>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h2>BONGO</h2>
  <a href="shop.html">🏠 Dashboard</a>
  <a href="cart.html">🛒 Cart</a>
  <a href="orderhistory.html">📦 Orders</a>
  <a href="payment.html">💳 Payment</a>
  <a href="#" onclick="logout()">🚪 Logout</a>
</div>

<!-- MAIN -->
<div class="main">

  <!-- NAV -->
  <nav>
    <div>
      <span class="menu-btn" onclick="toggleSidebar()">☰</span>
      <input type="text" class="search-box" placeholder="Search..." onkeyup="searchProducts(this.value)">
      <span class="username" id="username"></span>
    </div>

    <div class="cart" onclick="window.location.href='cart.html'">
      🛒 <span class="badge" id="cart-count">0</span>
    </div>
  </nav>

  <!-- CONTENT -->
  <div class="container">
    <div class="category-bar" id="category-bar"></div>
    <div class="product-grid" id="grid"></div>
  </div>

</div>

<!-- TOAST -->
<div id="toast">Added to cart</div>

<script>
const API_BASE="https://my-full-stack-ae3l.onrender.com/api";
const username=localStorage.getItem("username");
let allProducts=[];

const sidebar=document.getElementById("sidebar");
const overlay=document.getElementById("overlay");

/* SIDEBAR TOGGLE */
function toggleSidebar(){
  sidebar.classList.toggle("show");
  overlay.classList.toggle("show");
}

/* INIT */
window.onload=function(){
  if(!username){
    window.location.href="login.html";
    return;
  }

  document.getElementById("username").innerText="Hello, "+username;

  loadProducts();
  loadCategories();
  fetchCartCount();
};

/* PRODUCTS */
async function loadProducts(){
  const grid=document.getElementById("grid");
  grid.innerHTML="Loading...";

  const res=await fetch(API_BASE+"/products");
  const data=await res.json();

  allProducts=data.products||data;
  renderProducts(allProducts);
}

/* SEARCH */
function searchProducts(q){
  renderProducts(allProducts.filter(p=>p.name.toLowerCase().includes(q.toLowerCase())));
}

/* CATEGORY */
async function loadCategories(){
  const res=await fetch(API_BASE+"/categories");
  const data=await res.json();

  const bar=document.getElementById("category-bar");
  bar.innerHTML='<button class="category-btn" onclick="renderProducts(allProducts)">All</button>';

  data.forEach(cat=>{
    const btn=document.createElement("button");
    btn.className="category-btn";
    btn.innerText=cat.category_name;
    btn.onclick=()=>renderProducts(allProducts.filter(p=>p.category===cat.category_name));
    bar.appendChild(btn);
  });
}

/* RENDER */
function renderProducts(products){
  const grid=document.getElementById("grid");

  if(!products.length){
    grid.innerHTML="No products";
    return;
  }

  grid.innerHTML=products.map(p=>`
    <div class="card">
      <div class="img-box">
        <img src="${p.images?.[0]||'https://via.placeholder.com/150'}">
      </div>
      <h4>${p.name}</h4>
      <div>⭐⭐⭐⭐☆</div>
      <div class="price">₹${p.price}</div>
      <button class="add-btn" onclick="addToCart(${p.product_id})">Add</button>
    </div>
  `).join("");
}

/* ADD CART */
async function addToCart(productId){
  await fetch(API_BASE+"/cart/add",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username,productId,quantity:1})
  });

  fetchCartCount();
  showToast();
}

/* CART COUNT */
async function fetchCartCount(){
  const res=await fetch(API_BASE+"/cart/items/count?username="+username);
  const count=await res.json();
  document.getElementById("cart-count").innerText=count;
}

/* TOAST */
function showToast(){
  const t=document.getElementById("toast");
  t.style.display="block";
  setTimeout(()=>t.style.display="none",2000);
}

/* LOGOUT */
function logout(){
  localStorage.clear();
  window.location.href="login.html";
}
</script>

</body>
</html>
