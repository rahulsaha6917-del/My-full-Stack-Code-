<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bongo Basket</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --purple:#ed3a3d;
  --pink:#d5db27;
  --orange:#36f50b;
  --bg:#f8fafc;
}

*{margin:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{background:var(--bg);}

/* NAVBAR */
nav{
  background:linear-gradient(135deg,var(--purple),var(--pink),var(--orange));
  color:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 5%;
}

.logo{
  font-weight:800;
  font-size:18px;
}

.search{
  padding:10px;
  border:none;
  border-radius:20px;
  width:250px;
}

/* CATEGORY */
.categories{
  display:flex;
  gap:20px;
  background:white;
  padding:15px;
  justify-content:center;
  flex-wrap:wrap;
}

.categories span{
  cursor:pointer;
  font-weight:600;
}

.categories span:hover{
  color:var(--purple);
}

/* GRID */
.container{padding:30px 5%;}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
  gap:20px;
}

.card{
  background:white;
  padding:15px;
  border-radius:15px;
  box-shadow:0 8px 20px rgba(0,0,0,0.05);
}

.card img{
  width:100%;
  height:150px;
  object-fit:contain;
}

.price{
  color:var(--orange);
  font-weight:700;
}

.btn{
  background:linear-gradient(135deg,var(--purple),var(--pink));
  color:white;
  border:none;
  padding:10px;
  width:100%;
  border-radius:8px;
  cursor:pointer;
}

/* SIDEBAR (DESKTOP ONLY) */
.sidebar{
  position:fixed;
  width:220px;
  height:100%;
  background:#020617;
  color:white;
  padding:20px;
}

.sidebar a{
  display:block;
  margin:10px 0;
  color:white;
  text-decoration:none;
}

/* MAIN SHIFT */
.main{
  margin-left:220px;
}

/* MOBILE */
@media(max-width:800px){
  .sidebar{display:none;}
  .main{margin-left:0;}
}
</style>
</head>

<body>

<!-- SIDEBAR (DESKTOP) -->
<div class="sidebar">
  <h2>BONGO</h2>
  <a href="#">Dashboard</a>
  <a href="#">Cart</a>
  <a href="#">Orders</a>
</div>

<!-- MAIN -->
<div class="main">

<!-- NAV -->
<nav>
  <div class="logo">BONGO BASKET</div>
  <input class="search" placeholder="Search..." onkeyup="searchProducts(this.value)">
  <div>🛒 <span id="count">0</span></div>
</nav>

<!-- CATEGORY -->
<div class="categories">
  <span onclick="loadProducts('all')">All</span>
  
</div>

<!-- PRODUCTS -->
<div class="container">
  <div class="grid" id="grid"></div>
</div>

</div>

<script>
const API="https://my-full-stack-ae3l.onrender.com/api";
let products=[];

window.onload=()=>{
  loadProducts('all');
};

/* LOAD */
async function loadProducts(cat){
  const res=await fetch(API+"/products");
  const data=await res.json();
  products=data.products||data;

  if(cat!=='all'){
    products=products.filter(p=>p.category===cat);
  }

  render(products);
}

/* SEARCH */
function searchProducts(q){
  render(products.filter(p=>p.name.toLowerCase().includes(q.toLowerCase())));
}

/* RENDER */
function render(list){
  document.getElementById("grid").innerHTML=list.map(p=>`
    <div class="card">
      <img src="${p.images?.[0]||'https://via.placeholder.com/150'}">
      <h4>${p.name}</h4>
      <div class="price">₹${p.price}</div>
      <button class="btn">Add</button>
    </div>
  `).join("");
}
</script>

</body>
</html>
