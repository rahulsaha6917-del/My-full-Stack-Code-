<!DOCTYPE html>
<html>
<head>
<title>Bongo Basket | Payment</title>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#6366f1;
  --accent:#22c55e;
  --bg:linear-gradient(135deg,#1e293b,#0f172a);
  --delivery:#f59e0b;
}

*{box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  margin:0;
  background:var(--bg);
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
}

/* HEADER */
.header{
  width:100%;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  border-radius:0 0 20px 20px;
}
.header h2{margin:0; font-size:24px;}
.header .user-info{
  font-weight:500;
  font-size:16px;
  margin-right:15px;
}
.header .btns button{
  margin-left:10px;
  border:none;
  padding:8px 14px;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
  transition:0.3s;
  color:white;
}
.header .shop-btn{background:var(--primary);}
.header .shop-btn:hover{background:#4f46e5;}
.header .logout-btn{background:#ef4444;}
.header .logout-btn:hover{background:#dc2626;}

/* 🔥 OFFER BAR */
.offer-bar{
  width:100%;
  overflow:hidden;
  background:linear-gradient(to right,#ef4444,#f59e0b);
}
.offer-track{
  display:flex;
  width:max-content;
  animation:moveRight 12s linear infinite;
}
.offer-text{
  padding:10px 40px;
  font-weight:700;
  font-size:18px;
  white-space:nowrap;
  color:white;
}

/* LEFT → RIGHT */
@keyframes moveRight{
  0%{transform:translateX(-50%);}
  100%{transform:translateX(100%);}
}

/* PAYMENT CONTAINER */
.container{
  width:400px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
  padding:30px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  margin-top:25px;
}

h2{text-align:center;margin-bottom:20px;}

.total{
  font-size:22px;
  font-weight:600;
  text-align:center;
  margin-bottom:10px;
  color:#22c55e;
}

.delivery{
  font-size:16px;
  text-align:center;
  margin-bottom:15px;
  color:var(--delivery);
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:none;
  outline:none;
  background:rgba(255,255,255,0.2);
  color:white;
}

input::placeholder{color:#ddd;}

button.pay-btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:linear-gradient(to right,#6366f1,#22c55e);
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
  margin-top:10px;
}
button.pay-btn:hover{transform:scale(1.05);}

.loader{
  display:none;
  text-align:center;
  margin-top:10px;
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div style="display:flex; align-items:center;">
    <h2>BONGO BASKET</h2>
    <div class="user-info" id="usernameDisplay"></div>
  </div>
  <div class="btns">
    <button class="shop-btn" onclick="goShop()">🏠 Dashboard</button>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</div>

<!-- 🔥 OFFER BAR -->
<div class="offer-bar">
  <div class="offer-track">
    <div class="offer-text">🎉 FLAT 50% OFF ON ALL PRODUCTS 🎉</div>
    <div class="offer-text">🎉 FLAT 50% OFF ON ALL PRODUCTS 🎉</div>
    <div class="offer-text">🎉 FLAT 50% OFF ON ALL PRODUCTS 🎉</div>
  </div>
</div>

<!-- PAYMENT -->
<div class="container">
  <h2>💳 Secure Payment</h2>

  <div class="total">Cart Total: ₹<span id="cartTotal">0</span></div>
  <div class="delivery" id="deliveryInfo"></div>
  <div class="total">Total Payable: ₹<span id="totalAmount">0</span></div>

  <input id="name" placeholder="Full Name">
  <input id="address" placeholder="Delivery Address">

  <button class="pay-btn" onclick="payNow()">Pay & Place Order</button>
  <div class="loader" id="loader">Processing Payment...</div>
</div>

<script>
const API="https://my-full-stack-ae3l.onrender.com/api";
const username = localStorage.getItem("username");

if(!username){ window.location="login.html"; }

document.getElementById("usernameDisplay").innerText = " Hello, " + username;

let cartTotal = 0;
let deliveryCharge = 0;
let totalAmount = 0;

async function loadCart(){
  const res = await fetch(API+"/cart/items?username="+username);
  const data = await res.json();

  cartTotal = data.cart.overall_total_price || 0;

  if(cartTotal < 10000 && cartTotal > 0){
    deliveryCharge = 200;
    document.getElementById("deliveryInfo").innerText = `Delivery Charge: ₹${deliveryCharge}`;
  } else {
    deliveryCharge = 0;
    document.getElementById("deliveryInfo").innerText = `Delivery is Free! 🎉`;
  }

  totalAmount = cartTotal + deliveryCharge;

  document.getElementById("cartTotal").innerText = cartTotal;
  document.getElementById("totalAmount").innerText = totalAmount;
}

loadCart();

async function payNow(){
  const name=document.getElementById("name").value;
  const address=document.getElementById("address").value;

  if(!name || !address){
    alert("Please fill all fields");
    return;
  }

  document.getElementById("loader").style.display="block";

  const res = await fetch(API+"/payment/create",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username,totalAmount})
  });

  const order = await res.json();

  var options={
    key:"rzp_test_LqWBBDbgwot5lh",
    amount:totalAmount*100,
    currency:"INR",
    name:"Bongo Basket",
    description:"Order Payment",
    order_id:order.orderId,
    handler:function(response){ verifyPayment(response); }
  };

  var rzp=new Razorpay(options);
  rzp.open();
}

async function verifyPayment(res){
  await fetch(API+"/payment/verify",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      username,
      razorpayOrderId:res.razorpay_order_id,
      razorpayPaymentId:res.razorpay_payment_id,
      razorpaySignature:res.razorpay_signature
    })
  });

  alert("✅ Payment Successful!");
  window.location="orderhistory.html";
}

function logout(){
  localStorage.clear();
  window.location.href="login.html";
}

function goShop(){
  window.location.href="shop.html";
}
</script>

</body>
</html>
