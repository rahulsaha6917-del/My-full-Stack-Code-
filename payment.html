<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bongo Basket | Payment</title>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#6366f1;
  --accent:#22c55e;
  --bg:linear-gradient(135deg,#1e293b,#0f172a);
  --delivery:#f59e0b;
}

*{
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  margin:0;
  background:var(--bg);
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
}

/* HEADER */
.header{
  width:100%;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.header h2{
  margin:0;
  font-size:20px;
}

.header .user-info{
  font-size:14px;
}

.header .btns{
  display:flex;
  gap:8px;
}

.header .btns button{
  border:none;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
  font-size:13px;
  color:white;
}

.header .shop-btn{background:var(--primary);}
.header .logout-btn{background:#ef4444;}

/* CONTAINER */
.container{
  width:400px;
  max-width:95%;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
  padding:25px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  margin-top:30px;
}

/* TEXT */
h2{
  text-align:center;
  margin-bottom:20px;
}

.total{
  font-size:20px;
  text-align:center;
  margin-bottom:8px;
  color:#22c55e;
}

.delivery{
  font-size:14px;
  text-align:center;
  margin-bottom:12px;
  color:var(--delivery);
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:none;
  outline:none;
  background:rgba(255,255,255,0.2);
  color:white;
  font-size:14px;
}

input::placeholder{
  color:#ddd;
}

/* BUTTON */
.pay-btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:linear-gradient(to right,#6366f1,#22c55e);
  color:white;
  font-size:15px;
  cursor:pointer;
  margin-top:10px;
  transition:0.3s;
}

.pay-btn:hover{
  transform:scale(1.05);
}

.loader{
  display:none;
  text-align:center;
  margin-top:10px;
}

/* 📱 MOBILE */
@media(max-width:600px){

  body{
    padding:10px;
  }

  .header{
    flex-direction:column;
    align-items:flex-start;
  }

  .header h2{
    font-size:18px;
  }

  .header .btns{
    width:100%;
    justify-content:space-between;
  }

  .container{
    width:100%;
    padding:20px;
    border-radius:12px;
  }

  .total{
    font-size:18px;
  }

  input{
    font-size:13px;
    padding:11px;
  }

  .pay-btn{
    font-size:14px;
    padding:13px;
  }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div>
    <h2>BONGO BASKET</h2>
    <div class="user-info" id="usernameDisplay"></div>
  </div>
  <div class="btns">
    <button class="shop-btn" onclick="goShop()">🏠 Dashboard</button>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</div>

<!-- PAYMENT BOX -->
<div class="container">
  <h2>💳 Secure Payment</h2>

  <div class="total">Cart Total: ₹<span id="cartTotal">0</span></div>
  <div class="delivery" id="deliveryInfo"></div>
  <div class="total">Total Payable: ₹<span id="totalAmount">0</span></div>

  <input id="name" placeholder="Full Name">
  <input id="address" placeholder="Delivery Address">

  <button class="pay-btn" onclick="payNow()">Pay & Place Order</button>
  <div class="loader" id="loader">Processing Payment...</div>
</div>

<script>
const API="https://my-full-stack-ae3l.onrender.com/api";
const username = localStorage.getItem("username");

if(!username){
  window.location="login.html";
}

document.getElementById("usernameDisplay").innerText = "Hello, " + username;

let cartTotal = 0;
let deliveryCharge = 0;
let totalAmount = 0;

async function loadCart(){
  try{
    const res = await fetch(API+"/cart/items?username="+username);
    const data = await res.json();

    cartTotal = data.cart?.overall_total_price || 0;

    if(cartTotal < 10000 && cartTotal > 0){
      deliveryCharge = 200;
      document.getElementById("deliveryInfo").innerText = "Delivery Charge: ₹200";
    } else if(cartTotal > 0){
      deliveryCharge = 0;
      document.getElementById("deliveryInfo").innerText = "Free Delivery 🎉";
    }

    totalAmount = cartTotal + deliveryCharge;

    document.getElementById("cartTotal").innerText = cartTotal;
    document.getElementById("totalAmount").innerText = totalAmount;

  }catch(e){
    alert("Error loading cart");
  }
}

loadCart();

async function payNow(){
  const name=document.getElementById("name").value.trim();
  const address=document.getElementById("address").value.trim();

  if(!name || !address){
    alert("Please fill all fields");
    return;
  }

  document.getElementById("loader").style.display="block";

  try{
    const res = await fetch(API+"/payment/create",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({username,totalAmount})
    });

    const order = await res.json();

    var options={
      key:"rzp_test_LqWBBDbgwot5lh",
      amount:totalAmount*100,
      currency:"INR",
      name:"Bongo Basket",
      description:"Order Payment",
      order_id:order.orderId,
      handler:function(response){
        verifyPayment(response);
      }
    };

    var rzp=new Razorpay(options);
    rzp.open();

  }catch(e){
    alert("Payment failed ❌");
  }

  document.getElementById("loader").style.display="none";
}

async function verifyPayment(res){
  await fetch(API+"/payment/verify",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      username,
      razorpayOrderId:res.razorpay_order_id,
      razorpayPaymentId:res.razorpay_payment_id,
      razorpaySignature:res.razorpay_signature
    })
  });

  alert("✅ Payment Successful!");
  window.location="orderhistory.html";
}

function logout(){
  localStorage.clear();
  window.location.href="login.html";
}

function goShop(){
  window.location.href="shop.html";
}
</script>

</body>
</html>
