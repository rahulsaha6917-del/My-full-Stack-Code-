<!DOCTYPE html>
<html>
<head>
<title>Bongo Basket | Payment</title>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#6366f1;
  --accent:#22c55e;
  --bg:linear-gradient(135deg,#1e293b,#0f172a);
  --delivery:#f59e0b;
}

*{box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  margin:0;
  background:var(--bg);
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
}

/* HEADER */
.header{
  width:100%;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-radius:0 0 20px 20px;
}
.header h2{margin:0;}
.header .btns button{
  margin-left:10px;
  border:none;
  padding:8px 14px;
  border-radius:10px;
  cursor:pointer;
  color:white;
}
.shop-btn{background:var(--primary);}
.logout-btn{background:#ef4444;}

/* PAYMENT BOX */
.container{
  width:400px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
  padding:30px;
  border-radius:20px;
  margin-top:25px;
}

.total{text-align:center; margin:10px 0; color:#22c55e;}
.delivery{text-align:center; color:var(--delivery);}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,0.2);
  color:white;
}

.pay-btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:linear-gradient(to right,#6366f1,#22c55e);
  color:white;
  cursor:pointer;
}

.loader{display:none; text-align:center; margin-top:10px;}

/* 🎉 CELEBRATION OVERLAY */
.celebration{
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
}

.celebration h1{
  color:#22c55e;
  font-size:40px;
  margin-bottom:20px;
}

/* 🎈 BALLOONS */
.balloon{
  position:absolute;
  top:-100px;
  width:40px;
  height:60px;
  border-radius:50%;
  animation:fall 4s linear infinite;
}

@keyframes fall{
  0%{transform:translateY(-100px);}
  100%{transform:translateY(110vh);}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <h2>BONGO BASKET</h2>
  <div class="btns">
    <button class="shop-btn" onclick="goShop()">🏠 Dashboard</button>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</div>

<!-- PAYMENT -->
<div class="container">
  <h2>💳 Secure Payment</h2>

  <div class="total">Cart Total: ₹<span id="cartTotal">0</span></div>
  <div class="delivery" id="deliveryInfo"></div>
  <div class="total">Total Payable: ₹<span id="totalAmount">0</span></div>

  <input id="name" placeholder="Full Name">
  <input id="address" placeholder="Delivery Address">

  <button class="pay-btn" onclick="payNow()">Pay & Place Order</button>
  <div class="loader" id="loader">Processing Payment...</div>
</div>

<!-- 🎉 CELEBRATION -->
<div class="celebration" id="celebration">
  <h1>🎉 Payment Successful! 🎉</h1>
</div>

<script>
const API="https://my-full-stack-ae3l.onrender.com/api";
const username = localStorage.getItem("username");

if(!username){ window.location="login.html"; }

let cartTotal=0, deliveryCharge=0, totalAmount=0;

async function loadCart(){
  const res = await fetch(API+"/cart/items?username="+username);
  const data = await res.json();

  cartTotal = data.cart.overall_total_price || 0;

  deliveryCharge = (cartTotal < 10000 && cartTotal>0) ? 200 : 0;
  document.getElementById("deliveryInfo").innerText =
    deliveryCharge ? "Delivery Charge: ₹"+deliveryCharge : "Delivery Free 🎉";

  totalAmount = cartTotal + deliveryCharge;

  document.getElementById("cartTotal").innerText = cartTotal;
  document.getElementById("totalAmount").innerText = totalAmount;
}
loadCart();

/* PAYMENT */
async function payNow(){
  const name=document.getElementById("name").value;
  const address=document.getElementById("address").value;

  if(!name || !address){
    alert("Please fill all fields");
    return;
  }

  document.getElementById("loader").style.display="block";

  const res = await fetch(API+"/payment/create",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username,totalAmount})
  });

  const order = await res.json();

  var options={
    key:"rzp_test_LqWBBDbgwot5lh",
    amount:totalAmount*100,
    currency:"INR",
    name:"Bongo Basket",
    order_id:order.orderId,
    handler:function(response){ verifyPayment(response); }
  };

  var rzp=new Razorpay(options);
  rzp.open();
}

/* 🎉 SUCCESS + BALLOONS */
async function verifyPayment(res){
  await fetch(API+"/payment/verify",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      username,
      razorpayOrderId:res.razorpay_order_id,
      razorpayPaymentId:res.razorpay_payment_id,
      razorpaySignature:res.razorpay_signature
    })
  });

  showCelebration();

  setTimeout(()=>{
    window.location="orderhistory.html";
  },5000);
}

/* CREATE BALLOONS */
function showCelebration(){
  const box = document.getElementById("celebration");
  box.style.display="flex";

  for(let i=0;i<25;i++){
    let b=document.createElement("div");
    b.className="balloon";
    b.style.left=Math.random()*100+"%";
    b.style.background=`hsl(${Math.random()*360},70%,60%)`;
    b.style.animationDuration=(3+Math.random()*2)+"s";
    box.appendChild(b);
  }
}

/* NAV */
function logout(){
  localStorage.clear();
  window.location="login.html";
}
function goShop(){
  window.location="shop.html";
}
</script>

</body>
</html>
