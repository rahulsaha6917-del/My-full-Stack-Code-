<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bongo Basket | Cart</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#14b8a6;
  --secondary:#6366f1;
  --accent:#f59e0b;
  --danger:#ef4444;
  --bg:#f3f4f6;
  --card-bg:#ffffff;
  --sidebar-bg:linear-gradient(to bottom,#6366f1,#22c55e);
}

*{margin:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background:var(--bg);
  display:flex;
  height:100vh;
  overflow:hidden;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  background:var(--sidebar-bg);
  color:white;
  display:flex;
  flex-direction:column;
  padding:30px 20px;
  border-radius:0 15px 15px 0;
}

.sidebar h2{margin-bottom:20px;}
.sidebar .nav-btn{
  background:rgba(255,255,255,0.2);
  border:none;
  padding:12px;
  border-radius:10px;
  width:100%;
  color:white;
  margin-bottom:10px;
  cursor:pointer;
}

/* MAIN */
.main-content{
  flex:1;
  padding:30px;
  overflow-y:auto;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:20px;
}

/* CART */
.cart-card{
  display:flex;
  align-items:center;
  gap:15px;
  background:white;
  padding:15px;
  margin-bottom:15px;
  border-radius:12px;
}

.product-img{
  width:80px;
  height:80px;
  object-fit:cover;
  border-radius:10px;
}

.details{flex:1;}

.qty-controls{
  display:flex;
  gap:5px;
  margin-top:5px;
}

.qty-btn{
  width:28px;height:28px;
  border:none;
  background:var(--primary);
  color:white;
  border-radius:5px;
  cursor:pointer;
}

.remove-btn{
  background:var(--danger);
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
}

/* TOTAL */
.total-box{
  background:white;
  padding:20px;
  border-radius:12px;
  margin-top:20px;
}

/* BUTTON */
.checkout-btn{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  background:linear-gradient(to right,var(--primary),var(--accent));
  color:white;
  border-radius:10px;
  cursor:pointer;
}

/* EMPTY */
.empty{
  text-align:center;
  padding:50px;
}

/* 📱 MOBILE */
@media(max-width:900px){

  body{
    flex-direction:column;
    height:auto;
    overflow:auto;
  }

  .sidebar{
    width:100%;
    flex-direction:row;
    justify-content:space-between;
    padding:15px;
    border-radius:0;
  }

  .sidebar h2{font-size:16px;}

  .sidebar .nav-btn{
    width:auto;
    font-size:12px;
    padding:8px;
  }

  .main-content{
    padding:15px;
  }

  .header{
    flex-direction:column;
    gap:10px;
  }

  .cart-card{
    flex-direction:column;
    align-items:flex-start;
  }

  .product-img{
    width:100%;
    height:150px;
  }

  .remove-btn{
    width:100%;
    margin-top:5px;
  }

  .total-box{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    border-radius:15px 15px 0 0;
    z-index:1000;
  }

  body{
    padding-bottom:120px;
  }

  /* bottom nav */
  .bottom-nav{
    position:fixed;
    bottom:80px;
    width:100%;
    display:flex;
    justify-content:space-around;
    background:white;
    padding:10px;
  }

  .bottom-nav button{
    border:none;
    background:none;
    font-size:14px;
  }
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>BONGO</h2>
  <button class="nav-btn" onclick="window.location.href='shop.html'">🏠</button>
  <button class="nav-btn" onclick="window.location.href='payment.html'">💳</button>
</div>

<div class="main-content">

  <div class="header">
    <h2>Cart</h2>
    <button onclick="logout()">Logout</button>
  </div>

  <div id="cart-container"></div>

  <div class="total-box">
    Total: ₹<span id="grandTotal">0</span>
    <p id="deliveryCharge"></p>
    <button class="checkout-btn" onclick="goPayment()">Checkout</button>
  </div>

</div>

<!-- bottom nav -->
<div class="bottom-nav">
  <button onclick="window.location.href='shop.html'">🏠 Home</button>
  <button onclick="window.location.href='cart.html'">🛒 Cart</button>
  <button onclick="window.location.href='payment.html'">💳 Pay</button>
</div>

<script>
const API_BASE="https://my-full-stack-ae3l.onrender.com/api";
const username=localStorage.getItem("username");

if(!username){window.location.href="login.html";}

async function loadCart(){
  const res=await fetch(API_BASE+"/cart/items?username="+username);
  const data=await res.json();

  const products=data.cart.products;
  const container=document.getElementById("cart-container");

  if(!products.length){
    container.innerHTML="<p class='empty'>Cart Empty</p>";
    return;
  }

  container.innerHTML=products.map(p=>`
    <div class="cart-card">
      <img class="product-img" src="${p.image_url}">
      <div class="details">
        <h3>${p.name}</h3>
        <p>₹${p.price_per_unit}</p>
        <div class="qty-controls">
          <button class="qty-btn" onclick="updateQty(${p.product_id},${p.quantity-1})">-</button>
          ${p.quantity}
          <button class="qty-btn" onclick="updateQty(${p.product_id},${p.quantity+1})">+</button>
        </div>
      </div>
      <div>₹${p.total_price}</div>
      <button class="remove-btn" onclick="removeItem(${p.product_id})">Remove</button>
    </div>
  `).join("");

  let total=data.cart.overall_total_price;
  let delivery= total<10000 ? 200:0;

  document.getElementById("deliveryCharge").innerText=
    delivery>0?"Delivery ₹"+delivery:"Free Delivery";

  document.getElementById("grandTotal").innerText=total+delivery;
}

async function updateQty(id,qty){
  if(qty<=0){removeItem(id);return;}
  await fetch(API_BASE+"/cart/update",{
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username,productId:id,quantity:qty})
  });
  loadCart();
}

async function removeItem(id){
  await fetch(API_BASE+"/cart/delete",{
    method:"DELETE",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username,productId:id})
  });
  loadCart();
}

function goPayment(){
  window.location.href="payment.html";
}

function logout(){
  localStorage.clear();
  window.location.href="login.html";
}

loadCart();
</script>

</body>
</html>
