<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bongo Basket | Cart</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#14b8a6;
  --secondary:#6366f1;
  --accent:#f59e0b;
  --danger:#ef4444;
  --bg:#f3f4f6;
  --card-bg:#ffffff;
  --sidebar-bg:linear-gradient(to bottom,#6366f1,#22c55e);
}

/* RESET */
*{margin:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:var(--bg); display:flex; height:100vh; overflow:hidden;}

/* SIDEBAR */
.sidebar{
  width:220px;
  background:var(--sidebar-bg);
  color:white;
  display:flex;
  flex-direction:column;
  padding:30px 20px;
  border-radius:0 15px 15px 0;
  box-shadow:0 0 20px rgba(0,0,0,0.2);
}
.sidebar h2{margin-bottom:20px;}
.sidebar .user-info{margin-bottom:30px;}
.sidebar .nav-btn{
  background:rgba(255,255,255,0.2);
  border:none;
  padding:12px;
  border-radius:10px;
  width:100%;
  color:white;
  font-weight:600;
  margin-bottom:10px;
  cursor:pointer;
}
.sidebar .nav-btn:hover{background:rgba(255,255,255,0.4);}

/* MAIN */
.main-content{
  flex:1;
  padding:30px;
  overflow-y:auto;
}

/* 🔥 MOVING HEADING */
.offer-bar{
  width:100%;
  overflow:hidden;
  background:linear-gradient(to right,#22c55e,#6366f1);
  border-radius:10px;
  margin-bottom:15px;
}
.offer-track{
  display:flex;
  width:max-content;
}
.offer-text{
  color:white;
  font-weight:700;
  font-size:18px;
  padding:10px 40px;
  white-space:nowrap;
}

/* LEFT → RIGHT */
@keyframes moveRight{
  0%{transform:translateX(-100%);}
  100%{transform:translateX(100%);}
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:white;
  padding:15px 20px;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
  border-radius:0 0 15px 0;
  margin-bottom:20px;
}
.header h2{color:var(--secondary);}
.logout-btn{
  background:var(--danger);
  border:none;
  padding:8px 14px;
  border-radius:8px;
  color:white;
  font-weight:600;
  cursor:pointer;
}

/* CART */
.cart-card{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:var(--card-bg);
  padding:20px;
  margin-bottom:20px;
  border-radius:15px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
}
.product-img{
  width:80px; height:80px; object-fit:cover; border-radius:10px;
}
.details{flex:2; padding:0 15px;}
.details h3{color:var(--secondary);}
.details p{color:#555; font-size:14px;}
.qty-controls{display:flex; gap:5px; align-items:center;}
.qty-btn{
  width:28px; height:28px;
  border:none;
  background:var(--primary);
  color:white;
  border-radius:5px;
  cursor:pointer;
}
.remove-btn{
  background:var(--danger);
  color:white;
  border:none;
  padding:6px 12px;
  border-radius:6px;
  cursor:pointer;
}

/* TOTAL */
.total-box{
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
  max-width:400px;
  margin-left:auto;
  text-align:right;
  position:sticky;
  top:20px;
}
.checkout-btn{
  margin-top:15px;
  background:linear-gradient(to right,var(--primary),var(--accent));
  color:white;
  border:none;
  padding:14px 20px;
  border-radius:12px;
  cursor:pointer;
}

/* EMPTY */
.empty{text-align:center; padding:50px;}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>BONGO BASKET</h2>
  <div class="user-info">
    <p>Welcome, <b id="userDisp"></b></p>
  </div>
  <button class="nav-btn" onclick="window.location.href='shop.html'">🏠 Dashboard</button>
  <button class="nav-btn" onclick="window.location.href='payment.html'">💳 Payment</button>
</div>

<!-- MAIN -->
<div class="main-content">

  <!-- 🔥 MOVING BANNER -->
  <div class="offer-bar">
    <div class="offer-track">
      <div class="offer-text">🛍️ SHOP NOW & GET ULTIMATE PRIZES | LIMITED TIME OFFER 🚀</div>
      <div class="offer-text">🛍️ SHOP NOW & GET ULTIMATE PRIZES | LIMITED TIME OFFER 🚀</div>
      <div class="offer-text">🛍️ SHOP NOW & GET ULTIMATE PRIZES | LIMITED TIME OFFER 🚀</div>
    </div>
  </div>

  <!-- HEADER -->
  <div class="header">
    <h2>Your Cart</h2>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <div id="cart-container"></div>

  <div class="total-box">
    Grand Total: ₹<span id="grandTotal">0</span>
    <p id="deliveryCharge"></p>
    <button class="checkout-btn" onclick="goPayment()">Checkout</button>
  </div>
</div>

<script>
const API_BASE="https://my-full-stack-ae3l.onrender.com/api";
const username=localStorage.getItem("username");
let cartProducts=[];
let deliveryCharge=0;

if(!username){window.location.href="login.html";}
document.getElementById("userDisp").innerText=username;

/* 🔥 ANIMATION LOOP (MOVE → STOP 5s) */
const track=document.querySelector(".offer-track");

function runAnimation(){
  track.style.animation="moveRight 12s linear";
  
  setTimeout(()=>{
    track.style.animation="none"; // stop
    setTimeout(runAnimation,5000); // wait 5s then restart
  },12000);
}

runAnimation();

/* LOAD CART */
async function loadCart(){
  try{
    const res=await fetch(API_BASE+"/cart/items?username="+username);
    const data=await res.json();
    cartProducts=data.cart.products;
    renderCart(cartProducts);
    calculateTotal(data.cart.overall_total_price);
  }catch{
    document.getElementById("cart-container").innerHTML="<p class='empty'>Failed to load cart</p>";
  }
}

/* RENDER */
function renderCart(products){
  const container=document.getElementById("cart-container");
  if(!products || products.length===0){
    container.innerHTML="<p class='empty'>Your cart is empty 😔</p>";
    return;
  }
  container.innerHTML=products.map(item=>`
    <div class="cart-card">
      <img class="product-img" src="${item.image_url}">
      <div class="details">
        <h3>${item.name}</h3>
        <p>Price: ₹${item.price_per_unit}</p>
        <div class="qty-controls">
          <button class="qty-btn" onclick="updateQty(${item.product_id},${item.quantity-1})">-</button>
          <span>${item.quantity}</span>
          <button class="qty-btn" onclick="updateQty(${item.product_id},${item.quantity+1})">+</button>
        </div>
      </div>
      <div>₹${item.total_price}</div>
      <button class="remove-btn" onclick="removeItem(${item.product_id})">Remove</button>
    </div>
  `).join('');
}

/* TOTAL */
function calculateTotal(overallTotal){
  deliveryCharge = overallTotal>0 && overallTotal<10000 ? 200 : 0;
  const finalTotal = overallTotal + deliveryCharge;
  document.getElementById("deliveryCharge").innerText =
    deliveryCharge>0 ? "Delivery Charge: ₹"+deliveryCharge : "Delivery Free";
  document.getElementById("grandTotal").innerText = finalTotal;
}

/* UPDATE */
async function updateQty(productId,qty){
  if(qty<=0){ removeItem(productId); return; }
  await fetch(API_BASE+"/cart/update",{
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username,productId,quantity:qty})
  });
  loadCart();
}

/* REMOVE */
async function removeItem(productId){
  await fetch(API_BASE+"/cart/delete",{
    method:"DELETE",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username,productId})
  });
  loadCart();
}

/* CHECKOUT */
function goPayment(){
  if(cartProducts.length===0){ alert("Cart is empty!"); return; }
  localStorage.setItem("deliveryCharge",deliveryCharge);
  window.location.href="payment.html";
}

/* LOGOUT */
function logout(){
  localStorage.clear();
  window.location.href="login.html";
}

loadCart();
</script>

</body>
</html>
