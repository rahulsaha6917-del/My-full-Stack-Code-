<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bongo Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Roboto;background:#f0f2f5;display:flex}

/* Sidebar */
.sidebar{
width:240px;
background:linear-gradient(180deg,#4b6cb7,#182848);
color:#fff;
height:100vh;
padding:20px;
}
.sidebar h2{text-align:center;margin-bottom:20px}
.sidebar a{
display:block;
padding:10px;
margin:5px 0;
border-radius:6px;
cursor:pointer;
}
.sidebar a:hover{background:rgba(255,255,255,0.2)}

/* Main */
.main{flex:1;padding:20px}

/* Card */
.card{
background:#fff;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* Inputs */
input{
width:100%;
padding:8px;
margin:5px 0 10px;
}

/* Button */
button{
padding:8px 15px;
background:#4b6cb7;
color:#fff;
border:none;
border-radius:5px;
cursor:pointer;
}
button:hover{background:#182848}

/* Table */
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border:1px solid #ddd;padding:8px;text-align:center}
th{background:#4b6cb7;color:#fff}

.deleteBtn{background:red}
.section{display:none}
</style>
</head>

<body>

<div class="sidebar">
<h2>Bongo Admin</h2>

<a onclick="show('dashboard')">Dashboard</a>
<a onclick="show('products')">View Products</a>
<a onclick="show('addProduct')">Add Product</a>
<a onclick="show('deleteProduct')">Delete Product</a>
<a onclick="show('users')">Users</a>
<a onclick="show('orders')">Orders</a>
<a onclick="show('business')">Business</a>

</div>

<div class="main">

<div class="card section" id="dashboard">
<h2>Dashboard</h2>
<p>Welcome Admin 👋</p>
</div>

<!-- PRODUCTS -->
<div class="card section" id="products">
<h3>All Products</h3>
<button onclick="loadProducts()">Load Products</button>

<table>
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Description</th>
<th>Price</th>
<th>Stock</th>
<th>Category</th>
<th>Image</th>
</tr>
</thead>

<tbody id="productTable"></tbody>
</table>
</div>

<!-- ADD PRODUCT -->
<div class="card section" id="addProduct">
<h3>Add Product</h3>

<input id="pname" placeholder="Name">
<input id="pdesc" placeholder="Description">
<input id="pprice" placeholder="Price">
<input id="pstock" placeholder="Stock">
<input id="pcategory" placeholder="Category ID">
<input id="pimage" placeholder="Image URL">

<button onclick="addProduct()">Add</button>
<p id="msg"></p>
</div>

<!-- DELETE PRODUCT -->
<div class="card section" id="deleteProduct">
<h3>Delete Product</h3>
<input id="deleteId" placeholder="Product ID">
<button onclick="deleteProduct()">Delete</button>
</div>

<!-- USERS -->
<div class="card section" id="users">
<h3>Users</h3>

<input id="uid" placeholder="User ID">
<button onclick="loadUser()">Load</button>

<input id="uname" placeholder="Username">
<input id="uemail" placeholder="Email">
<input id="urole" placeholder="Role">

<button onclick="updateUser()">Update</button>
<p id="userMsg"></p>
</div>

<!-- ORDERS -->
<div class="card section" id="orders">
<h3>Orders</h3>
<button onclick="loadOrders()">Load Orders</button>

<table>
<thead>
<tr>
<th>ID</th>
<th>User ID</th>
<th>Username</th>
<th>Total</th>
<th>Status</th>
<th>Delete</th>
</tr>
</thead>

<tbody id="ordersTable"></tbody>
</table>
</div>

<!-- BUSINESS -->
<div class="card section" id="business">
<h3>Business</h3>

<input type="date" id="date">
<button onclick="daily()">Daily</button>

<input id="month" placeholder="Month">
<input id="year" placeholder="Year">
<button onclick="monthly()">Monthly</button>

<input id="year2" placeholder="Year">
<button onclick="yearly()">Yearly</button>

<div id="result"></div>
</div>

</div>

<script>

const API="https://my-full-stack-ae3l.onrender.com";

/* Navigation */
function show(id){
document.querySelectorAll('.section').forEach(s=>s.style.display='none');
document.getElementById(id).style.display='block';
}
show('dashboard');

/* PRODUCTS */
async function loadProducts(){
const res=await fetch(API+"/products");
const data=await res.json();

productTable.innerHTML=data.map(p=>`
<tr>
<td>${p.product_id}</td>
<td>${p.name}</td>
<td>${p.description}</td>
<td>₹${p.price}</td>
<td>${p.stock}</td>
<td>${p.category_id}</td>
<td><img src="${p.image_url}" width="50"/></td>
</tr>`).join('');
}

/* ADD PRODUCT */
async function addProduct(){
const body={
name:pname.value,
description:pdesc.value,
price:pprice.value,
stock:pstock.value,
categoryId:pcategory.value,
imageUrl:pimage.value
};

const res=await fetch(API+"/admin/products/add",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(body)
});

msg.innerText=await res.text();
}

/* DELETE PRODUCT */
async function deleteProduct(){
await fetch(API+"/admin/products/delete",{
method:"DELETE",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({productId:deleteId.value})
});
alert("Deleted");
}

/* USERS */
async function loadUser(){
const res=await fetch(API+"/admin/users/"+uid.value);
const u=await res.json();

uname.value=u.username;
uemail.value=u.email;
urole.value=u.role;
}

async function updateUser(){
await fetch(API+"/admin/users/modify",{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
userId:uid.value,
username:uname.value,
email:uemail.value,
role:urole.value
})
});
userMsg.innerText="Updated";
}

/* ORDERS */
async function loadOrders(){
const res=await fetch(API+"/admin/orders/all");
const data=await res.json();

const rows=await Promise.all(data.map(async o=>{
let name="Unknown";

try{
const u=await fetch(API+"/admin/users/"+o.user_id);
const user=await u.json();
name=user.username;
}catch{}

return `
<tr>
<td>${o.order_id}</td>
<td>${o.user_id}</td>
<td>${name}</td>
<td>₹${o.total_amount}</td>
<td>${o.status}</td>
<td><button class="deleteBtn" onclick="delOrder(${o.order_id})">X</button></td>
</tr>`;
}));

ordersTable.innerHTML=rows.join('');
}

async function delOrder(id){
await fetch(API+"/admin/orders/delete/"+id,{method:"DELETE"});
loadOrders();
}

/* BUSINESS */
async function daily(){
const res=await fetch(API+"/admin/business/daily?date="+date.value);
const d=await res.json();
result.innerHTML=`Total ₹${d.totalBusiness}`;
}

async function monthly(){
const res=await fetch(API+`/admin/business/monthly?month=${month.value}&year=${year.value}`);
const d=await res.json();
result.innerHTML=`Total ₹${d.totalBusiness}`;
}

async function yearly(){
const res=await fetch(API+"/admin/business/yearly?year="+year2.value);
const d=await res.json();
result.innerHTML=`Total ₹${d.totalBusiness}`;
}

</script>

</body>
</html>
