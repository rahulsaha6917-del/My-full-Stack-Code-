<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Roboto',sans-serif;display:flex;min-height:100vh;background:#f0f2f5}

/* Sidebar */
.sidebar{width:250px;background:linear-gradient(180deg,#4b6cb7,#182848);color:white;display:flex;flex-direction:column;padding:20px}
.sidebar h2{text-align:center;margin-bottom:40px}
.sidebar a{color:white;text-decoration:none;padding:12px 15px;margin:5px 0;border-radius:8px;display:block;cursor:pointer;transition:.2s}
.sidebar a:hover{background:rgba(255,255,255,0.15)}

/* Main */
.main{flex:1;padding:20px 30px}
.main-header{font-size:28px;font-weight:700;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}

/* Card */
.card{background:white;padding:20px;border-radius:12px;box-shadow:0 6px 15px rgba(0,0,0,0.1);margin-bottom:20px}
.card:hover{transform:translateY(-5px)}
.card h3{color:#4b6cb7;margin-bottom:15px}

/* Inputs */
input{width:100%;padding:10px;margin:5px 0 15px;border-radius:6px;border:1px solid #ccc}
button{padding:10px 20px;background:linear-gradient(90deg,#4b6cb7,#182848);border:none;color:white;border-radius:8px;cursor:pointer}
button:hover{transform:translateY(-2px)}

/* Table */
table{width:100%;border-collapse:collapse;margin-top:15px}
th,td{border:1px solid #ddd;padding:10px;text-align:center}
th{background:#4b6cb7;color:white}
.deleteBtn{background:#e74c3c}

/* Sections */
.section{display:none}

/* Business Cards */
.business-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-top:20px}
.business-card{background:linear-gradient(135deg,#6a11cb,#2575fc);color:white;padding:15px;border-radius:12px}

/* Responsive */
@media(max-width:768px){
body{flex-direction:column}
.sidebar{width:100%;flex-direction:row;overflow-x:auto}
.sidebar a{flex:1;text-align:center}
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>Bongo Admin</h2>
  <a onclick="showSection('businessDaily')">Daily</a>
  <a onclick="showSection('businessMonthly')">Monthly</a>
  <a onclick="showSection('businessYearly')">Yearly</a>
  <a onclick="showSection('addProduct')">Add Product</a>
  <a onclick="showSection('deleteProduct')">Delete Product</a>
  <a onclick="showSection('modifyUser')">Users</a>
  <a onclick="showSection('orders')">Orders</a>
</div>

<div class="main">

<div class="main-header">
Dashboard
<button onclick="logout()">Logout</button>
</div>

<!-- Daily -->
<div class="card section" id="businessDaily">
<h3>Daily Business</h3>
<input type="date" id="dailyDate">
<button onclick="loadDailyBusiness()">Check</button>
<div id="dailyResult" class="business-cards"></div>
</div>

<!-- Monthly -->
<div class="card section" id="businessMonthly">
<h3>Monthly Business</h3>
<input type="number" id="month" placeholder="Month (1-12)">
<input type="number" id="year" placeholder="Year">
<button onclick="loadMonthlyBusiness()">Check</button>
<div id="monthlyResult" class="business-cards"></div>
</div>

<!-- Yearly -->
<div class="card section" id="businessYearly">
<h3>Yearly Business</h3>
<input type="number" id="yearlyYear" placeholder="Year">
<button onclick="loadYearlyBusiness()">Check</button>
<div id="yearlyResult" class="business-cards"></div>
</div>

<!-- Add Product -->
<div class="card section" id="addProduct">
<h3>Add Product</h3>
<input id="pname" placeholder="Name">
<input id="pdesc" placeholder="Description">
<input id="pprice" placeholder="Price">
<input id="pstock" placeholder="Stock">
<input id="pcategory" placeholder="Category ID">
<input id="pimage" placeholder="Image URL">
<button onclick="addProduct()">Add</button>
<p id="addProductMsg"></p>
</div>

<!-- Delete Product -->
<div class="card section" id="deleteProduct">
<h3>Delete Product</h3>
<input id="deleteProductId" placeholder="Product ID">
<button onclick="deleteProduct()">Delete</button>
</div>

<!-- Modify User -->
<div class="card section" id="modifyUser">
<h3>Modify User</h3>

<input id="userId" placeholder="Enter User ID">
<button onclick="loadUser()">Load User</button>

<input id="username" placeholder="Username">
<input id="email" placeholder="Email">
<input id="role" placeholder="Role">

<button onclick="modifyUser()">Update</button>
<p id="userMsg"></p>
</div>

<!-- Orders -->
<div class="card section" id="orders">
<h3>Orders</h3>
<button onclick="loadOrders()">Load</button>

<table>
<thead>
<tr>
<th>ID</th>
<th>User ID</th>
<th>Username</th>
<th>Total</th>
<th>Status</th>
<th>Delete</th>
</tr>
</thead>

<tbody id="ordersTable"></tbody>
</table>
</div>

</div>

<script>
const API="https://my-full-stack-ae3l.onrender.com";

window.onload = () => {
            const userName = localStorage.getItem("user") || "Admin";
            document.getElementById("admin-display-name").innerText = `${userName} (Admin)`;
        };

        function toggleSidebar() {
            document.getElementById("sidebar").classList.toggle("active");
            document.getElementById("overlay").classList.toggle("active");
        }

        function showSection(id, btn) {
            document.querySelectorAll(".section").forEach(s => s.style.display = "none");
            document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
            document.getElementById(id).style.display = "block";
            btn.classList.add("active");
            
            // Auto-hide sidebar on mobile after clicking a menu item
            if(window.innerWidth <= 1024) {
                document.getElementById("sidebar").classList.remove("active");
                document.getElementById("overlay").classList.remove("active");
            }
            
            document.getElementById("page-title").innerText = btn.innerText.replace(/[^\w\s]/gi, '').trim();
            if (id === 'orders') fetchOrders();
        }

        function logout() {
            if (confirm("Logout from Bongo Basket Admin?")) {
                localStorage.clear();
                window.location.href = "login.html";
            }
        }

        // --- VALIDATION HELPER ---
        function showError(boxId, msg = "Wrong input or missing data") {
            const box = document.getElementById(boxId);
            box.style.display = "block";
            box.className = "result-box error";
            box.innerText = `❌ Error: ${msg}`;
            return false;
        }

        async function handleResponse(response, boxId, labelText) {
            const box = document.getElementById(boxId);
            box.style.display = "block";
            if (!response.ok) {
                const text = await response.text();
                box.className = "result-box error";
                box.innerText = `❌ Error: ${text || "Failed"}`;
                return;
            }
            const data = await response.json().catch(() => null);
            box.className = "result-box success";
            box.innerText = `✅ ${labelText} Successful`;
            if (data && (data.totalBusiness !== undefined || typeof data === 'number')) {
                const val = data.totalBusiness !== undefined ? data.totalBusiness : data;
                document.getElementById("lifetime-val").innerText = "₹" + Number(val).toLocaleString();
            }
        }

        async function fetchOrders() {
            try {
                const res = await fetch(`${BASE_URL}/admin/orders/all`);
                const orders = await res.json();
                document.getElementById("orderTableBody").innerHTML = orders.map(o => `
                    <tr>
                        <td style="font-weight:bold; color:var(--brand-purple)">#${o.orderId || o.order_id}</td>
                        <td>UID: ${o.userId || o.user_id}</td>
                        <td style="color:var(--brand-pink); font-weight:700">₹${o.totalAmount || o.total_amount}</td>
                        <td><span style="background:#fef9c3; padding:4px 8px; border-radius:4px; font-size:11px;">${o.status}</span></td>
                        <td><button class="btn-danger" style="padding:4px 8px; border-radius:4px; border:none;" onclick="deleteOrder('${o.orderId || o.order_id}')">Del</button></td>
                    </tr>
                `).join('');
            } catch (e) { console.error(e); }
        }

        async function deleteOrder(id) {
            if (!confirm(`Delete order #${id}?`)) return;
            const res = await fetch(`${BASE_URL}/admin/orders/delete/${id}`, { method: "DELETE" });
            if (res.ok) fetchOrders();
            handleResponse(res, "orderResult", "Deletion");
        }

        async function addProduct() {
            const name = document.getElementById('pname').value;
            const desc = document.getElementById('pdesc').value;
            const price = document.getElementById('pprice').value;
            const stock = document.getElementById('pstock').value;
            const catId = document.getElementById('pcategory').value;
            const img = document.getElementById('pimage').value;

            if (!name || !desc || !price || !stock || !catId || !img) return showError("addResult");

            const res = await fetch(`${BASE_URL}/admin/products/add`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    name: name, description: desc, price: Number(price),
                    stock: Number(stock), categoryId: Number(catId), imageUrl: img
                })
            });
            handleResponse(res, "addResult", "Addition");
        }

        async function deleteProduct() {
            const id = document.getElementById('deleteId').value;
            if (!id || id <= 0) return showError("deleteResult");

            const res = await fetch(`${BASE_URL}/admin/products/delete`, {
                method: "DELETE",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ productId: Number(id) })
            });
            handleResponse(res, "deleteResult", "Deletion");
        }

        async function fetchUserDetails() {
            const id = document.getElementById('uid').value;
            if (!id) return alert("Enter a User ID");
            try {
                const res = await fetch(`${BASE_URL}/admin/users/${id}`);
                if (!res.ok) throw new Error();
                const user = await res.json();
                document.getElementById('uname').value = user.username;
                document.getElementById('uemail').value = user.email;
                document.getElementById('urole').value = user.role;
            } catch (e) { alert("User not found or wrong input"); }
        }

        async function modifyUser() {
            const id = document.getElementById('uid').value;
            const role = document.getElementById('urole').value;
            if (!id) return showError("userResult");

            const res = await fetch(`${BASE_URL}/admin/users/modify`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ userId: Number(id), role: role })
            });
            handleResponse(res, "userResult", "Update");
        }

        async function deleteUserAccount() {
            const id = document.getElementById('delUserId').value;
            if (!id) return showError("delUserResult");
            if (!confirm(`Delete User ID: ${id}?`)) return;

            const res = await fetch(`${BASE_URL}/admin/users/${id}`, { method: "DELETE" });
            handleResponse(res, "delUserResult", "Deletion");
        }

        async function overallBusiness() {
            const res = await fetch(`${BASE_URL}/admin/business/overall`);
            handleResponse(res, "businessResult", "Overall Revenue");
        }

        async function dailyBusiness() {
            const date = document.getElementById('date').value;
            if (!date) return showError("businessResult", "Please select a date");
            const res = await fetch(`${BASE_URL}/admin/business/daily?date=${date}`);
            handleResponse(res, "businessResult", "Daily Revenue");
        }

        async function monthlyBusiness() {
            const m = document.getElementById('month').value;
            const y = document.getElementById('yearMonth').value;
            if (!m || !y || m < 1 || m > 12) return showError("businessResult");
            const res = await fetch(`${BASE_URL}/admin/business/monthly?month=${m}&year=${y}`);
            handleResponse(res, "businessResult", "Monthly Revenue");
        }

        async function yearlyBusiness() {
            const year = document.getElementById('yearOnly').value;
            if (!year || year.length < 4) return showError("businessResult");
            const res = await fetch(`${BASE_URL}/admin/business/yearly?year=${year}`);
            handleResponse(res, "businessResult", "Yearly Revenue");
        }
    </script>
</body>
</html>
