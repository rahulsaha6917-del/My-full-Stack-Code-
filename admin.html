<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family: 'Roboto', sans-serif; display:flex; min-height:100vh; background:#f0f2f5; }

  /* Sidebar */
  .sidebar { width:250px; background: linear-gradient(180deg,#4b6cb7,#182848); color:white; display:flex; flex-direction:column; padding:20px; }
  .sidebar h2 { text-align:center; margin-bottom:40px; }
  .sidebar a { color:white; text-decoration:none; padding:12px 15px; margin:5px 0; border-radius:8px; display:block; cursor:pointer; transition:0.2s; }
  .sidebar a:hover { background: rgba(255,255,255,0.15); }

  /* Main */
  .main { flex:1; padding:20px 30px; }
  .main-header { font-size:28px; font-weight:700; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center; }

  /* Card style */
  .card { background:white; padding:20px; border-radius:12px; box-shadow:0 6px 15px rgba(0,0,0,0.1); transition:0.2s; margin-bottom:20px; }
  .card:hover { transform: translateY(-5px); box-shadow:0 10px 25px rgba(0,0,0,0.15); }
  .card h3 { color:#4b6cb7; margin-bottom:15px; }

  /* Buttons & Inputs */
  button { padding:10px 20px; background: linear-gradient(90deg,#4b6cb7,#182848); border:none; color:white; cursor:pointer; border-radius:8px; margin-top:10px; font-weight:500; transition:0.2s; }
  button:hover { background: linear-gradient(90deg,#182848,#4b6cb7); transform: translateY(-2px); }
  input, select { width:100%; padding:10px; margin:5px 0 15px 0; border-radius:6px; border:1px solid #ccc; font-size:14px; }

  /* Tables */
  table { width:100%; border-collapse: collapse; margin-top:15px; }
  th, td { border:1px solid #ddd; padding:10px; text-align:center; }
  th { background:#4b6cb7; color:white; }
  .deleteBtn { background:#e74c3c; padding:6px 12px; font-size:12px; }
  .deleteBtn:hover { background:#c0392b; transform: translateY(-2px); }

  /* Hide all sections by default */
  .section { display:none; }

  /* Business card grid */
  .business-cards { display:grid; grid-template-columns:repeat(auto-fit, minmax(220px,1fr)); gap:20px; margin-top:20px; }
  .business-card { background: linear-gradient(135deg,#6a11cb,#2575fc); color:white; padding:15px; border-radius:12px; box-shadow:0 6px 15px rgba(0,0,0,0.1); transition:0.2s; }
  .business-card:hover { transform: translateY(-5px); box-shadow:0 10px 25px rgba(0,0,0,0.2); }
  .business-card h4 { margin-bottom:10px; }
  .business-card p { font-size:16px; font-weight:500; }

  @media(max-width:768px){
    body { flex-direction:column; }
    .sidebar { width:100%; flex-direction:row; overflow-x:auto; }
    .sidebar h2 { flex:1; text-align:left; }
    .sidebar a { flex:1; text-align:center; margin:0 5px; }
  }
</style>
</head>
<body>

<div class="sidebar">
  <h2>Bongo Admin Panel</h2>
  <a onclick="showSection('businessDaily')">Daily Business</a>
  <a onclick="showSection('businessMonthly')">Monthly Business</a>
  <a onclick="showSection('businessYearly')">Yearly Business</a>
  <a onclick="showSection('addProduct')">Add Product</a>
  <a onclick="showSection('deleteProduct')">Delete Product</a>
  <a onclick="showSection('modifyUser')">Modify User</a>
  <a onclick="showSection('orders')">Orders</a>
</div>

<div class="main">
  <div class="main-header">
    Dashboard
    <button onclick="logout()">Logout</button>
  </div>

  <!-- Daily Business -->
  <div class="card section" id="businessDaily">
    <h3>Daily Business Report</h3>
    <input type="date" id="dailyDate">
    <button onclick="loadDailyBusiness()">Check</button>
    <div id="dailyResult" class="business-cards"></div>
  </div>

  <!-- Monthly Business -->
<div id="deleteProduct" class="section" style="display:none">
    <div class="card" style="border-top: 4px solid #ef4444;">
        <h3 class="section-header" style="color:#ef4444">Remove from Inventory</h3>
        <label>Product ID</label>
        <input id="deleteId" type="number" style="margin-bottom:15px">
        <button class="btn btn-danger" style="width:100%" onclick="deleteProduct()">Confirm Deletion</button>
        <div id="deleteResult" class="result-box"></div>
    </div>
</div>

  <!-- Yearly Business -->
  <div class="card section" id="businessYearly">
    <h3>Yearly Business Report</h3>
    <input type="number" id="yearlyYear" placeholder="Year">
    <button onclick="loadYearlyBusiness()">Check</button>
    <div id="yearlyResult" class="business-cards"></div>
  </div>

  <!-- Add Product -->
  <div class="card section" id="addProduct">
    <h3>Add Product</h3>
    <input id="pname" placeholder="Product Name">
    <input id="pdesc" placeholder="Description">
    <input id="pprice" placeholder="Price">
    <input id="pstock" placeholder="Stock">
    <input id="pcategory" placeholder="Category ID">
    <input id="pimage" placeholder="Image URL">
    <button onclick="addProduct()">Add Product</button>
    <p id="addProductMsg"></p>
  </div>

  <!-- Delete Product -->
  <div class="card section" id="deleteProduct">
    <h3>Delete Product</h3>
    <input id="deleteProductId" placeholder="Product ID">
    <button onclick="deleteProduct()">Delete Product</button>
  </div>

  <!-- Modify User -->
  <div class="card section" id="modifyUser">
    <h3>Modify User</h3>
    <input id="userId" placeholder="User ID">
    <input id="username" placeholder="Username">
    <input id="email" placeholder="Email">
    <input id="role" placeholder="Role (USER / ADMIN)">
    <button onclick="modifyUser()">Update User</button>
    <p id="userMsg"></p>
  </div>

  <!-- Orders -->
  <div class="card section" id="orders">
    <h3>Orders</h3>
    <button onclick="loadOrders()">Load Orders</button>
    <table>
      <thead>
        <tr>
          <th>Order ID</th>
          <th>User ID</th>
          <th>Total</th>
          <th>Status</th>
          <th>Delete</th>
        </tr>
      </thead>
      <tbody id="ordersTable"></tbody>
    </table>
  </div>
</div>

<script>
const API="https://my-full-stack-ae3l.onrender.com";

/* Show only one section at a time */
function showSection(sectionId){
  document.querySelectorAll('.section').forEach(s => s.style.display='none');
  document.getElementById(sectionId).style.display='block';
}
/* Default section */
showSection('businessDaily');

/* ----------------- Business Functions ----------------- */
async function loadDailyBusiness(){
  const date=document.getElementById("dailyDate").value;
  const res=await fetch(API+"/admin/business/daily?date="+date);
  const data=await res.json();
  showBusinessCards(data, 'dailyResult');
}

async function loadMonthlyBusiness(){
  const month=document.getElementById("month").value;
  const year=document.getElementById("year").value;
  const res=await fetch(API+"/admin/business/monthly?month="+month+"&year="+year);
  const data=await res.json();
  showBusinessCards(data, 'monthlyResult');
}

async function loadYearlyBusiness(){
  const year=document.getElementById("yearlyYear").value;
  const res=await fetch(API+"/admin/business/yearly?year="+year);
  const data=await res.json();
  showBusinessCards(data, 'yearlyResult');
}

function showBusinessCards(data, containerId){
  const container=document.getElementById(containerId);
  container.innerHTML="";

  const totalCard=document.createElement("div");
  totalCard.className="business-card";
  totalCard.innerHTML=`<h4>Total Business</h4><p>₹${data.totalBusiness}</p>`;
  container.appendChild(totalCard);

  for(let cat in data.categorySales){
    const card=document.createElement("div");
    card.className="business-card";
    card.innerHTML=`<h4>${cat}</h4><p>${data.categorySales[cat]} items sold</p>`;
    container.appendChild(card);
  }
}

/* ----------------- Product Functions ----------------- */
async function addProduct(){
  const body={
    name:document.getElementById("pname").value,
    description:document.getElementById("pdesc").value,
    price:document.getElementById("pprice").value,
    stock:document.getElementById("pstock").value,
    categoryId:document.getElementById("pcategory").value,
    imageUrl:document.getElementById("pimage").value
  };
  const res=await fetch(API+"/admin/products/add",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  const data=await res.text();
  document.getElementById("addProductMsg").innerText=data;
}

async function deleteProduct(){
  const body={ productId:document.getElementById("deleteProductId").value };
  await fetch(API+"/admin/products/delete",{ method:"DELETE", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body)});
  alert("Product Deleted");
}

/* ----------------- User Functions ----------------- */
async function modifyUser(){
  const body={
    userId:document.getElementById("userId").value,
    username:document.getElementById("username").value,
    email:document.getElementById("email").value,
    role:document.getElementById("role").value
  };
  await fetch(API+"/admin/users/modify",{ method:"PUT", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body)});
  document.getElementById("userMsg").innerText="User Updated";
}

/* ----------------- Orders Functions ----------------- */
async function loadOrders(){
  const res=await fetch(API+"/admin/orders/all");
  const data=await res.json();
  let html="";
  data.forEach(o=>{
    html+=`<tr><td>${o.order_id}</td><td>${o.user_id}</td><td>₹${o.total_amount}</td><td>${o.status}</td><td><button class="deleteBtn" onclick="deleteOrder('${o.order_id}')">Delete</button></td></tr>`;
  });
  document.getElementById("ordersTable").innerHTML=html;
}

async function deleteOrder(id){
  await fetch(API+"/admin/orders/delete/"+id,{ method:"DELETE" });
  loadOrders();
}

/* ----------------- Logout ----------------- */
function logout(){
  localStorage.clear();
  window.location.href="login.html";
}
</script>
</body>
</html>
